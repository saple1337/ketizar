RHS_federation_of_rhodesia:0 "Federation of Rhodesia"
RHS_federation_of_rhodesia_DEF:0 "the Federation of Rhodesia"
RHS_federation_of_rhodesia_ADJ:0 "Rhodesian"
RHS_federation_of_rhodesia_nyasaland:0 "Federation of Rhodesia and Nyasaland"
