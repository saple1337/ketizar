RHS_anti_air_equipment_1_short:0 "QF 3-inch"
RHS_anti_air_equipment_2:0 "QF 40 mm Bofors"
RHS_anti_air_equipment_3:0 "QF 3.7-inch"
RHS_artillery_equipment_1:0 "QF 18-pounder"
RHS_artillery_equipment_1_short:0 "QF 18-pounder"
RHS_artillery_equipment_2:0 "QF 25-pounder"
RHS_artillery_equipment_3:0 "BL 5.5-inch Medium Gun"
RHS_rocket_artillery_equipment_1:0 "RP-3 High Explosive/General Purpose"
RHS_rocket_artillery_equipment_1_short:0 "RP-3 HE/GP"
RHS_rocket_artillery_equipment_2:0 "RP-3 High Explosive/Semi Armor-Piercing"
RHS_rocket_artillery_equipment_2_short:0 "RP-3 HE/SAP"
RHS_artillery_equipment_1_desc:0 "The Ordnance QF 18-pdr was the standard British Empire field gun of the First World War-era. It formed the backbone of the Royal Field Artillery during the Great War, and was produced in large numbers. It was used by British Forces in all the main theatres. Its calibre (84 mm) and shell weight were greater than equivalent field guns in French (75 mm) and German (77 mm) service. The first versions were introduced in 1904. Later versions remained in service with British forces until early 1942. In the interwar period, the 18-pdr was developed into the early versions of the equally famous Ordnance QF 25-pounder."
RHS_artillery_equipment_2_desc:0 "The Ordnance QF 25-pdr was the major British and Commonwealth field gun and howitzer during the Second World War, possessing a 3.45-inch (87.6 mm) calibre. It was introduced into service just before the war started, combining high-angle and direct-fire, relatively high rates of fire, and a reasonably lethal shell in a highly mobile piece. It remained the British Army's primary artillery field piece well into the 1960s. Many Commonwealth Nations continued using their 25-pdr guns in active or reserve service until the 1970s."
RHS_artillery_equipment_3_desc:0 "In January 1939 a specification was issued for a gun to replace the 6 inch 26 cwt howitzers in use with most Royal Artillery medium batteries. The first units were equipped in UK in the summer of 1941 and in North Africa a year later. It also equipped Canadian, Australian, South African, Polish and Indian regiments, and post war, it was also used by New Zealand. The 5.5 was retained after the war and saw service with the Royal Artillery on operations in Korea, South Arabia and Borneo. All of the 5.5 inch guns were manufactured in the UK."
RHS_anti_tank_equipment_1_desc:0 "It was used extensively in France, and the Mediterranean and North African Campaigns. In its vehicle-mounted variant the 2-pounder was a common main gun on British tanks early in World War II, as well as being a typical main armament of armoured cars throughout the war. As Axis tanks' armoured protection improved, the 2-pounder lost effectiveness and it was gradually replaced by the 6-pounder starting in 1942. From mid-1942, the 2-pdr was increasingly displaced to Home defence units, and to the Far East, where it was still effective against the smaller and more lightly armoured Japanese tanks."
RHS_anti_tank_equipment_2_desc:0 "The QF 6-pdr was the primary anti-tank gun of the British Army during the war, and the main armament for a number of armoured fighting vehicles. Although designed before the war, it was highly effective and entered service in 1942. The US Army also adopted the 6-pounder as their primary anti-tank gun as the 57 mm Gun M1. The first Tiger tanks encountered in North Africa were knocked out by towed 6 pounder AT guns. The 48th Royal Tank Regiment knocked out, destroyed, and captured Tiger 1's with their 6-pdr armed Churchill tanks, in the first tank vs. tank action against Tiger 1's by the Western Allies."
RHS_anti_tank_equipment_3_desc:0 "The 17-pdr was a late war British anti-tank gun used on its own carriage, as well as equipping a number of British tanks. Used with the APDS shot, it was capable of defeating all but the thickest armour on German tanks. It was used to 'up-gun' some foreign-built vehicles in British service, notably to produce the Sherman Firefly variant of the US M4 Sherman tank. Fully developed 17-pdrs started production in 1943, were first used during the Italian Campaign and saw extensive service thoughout the North-West Campaign in 1944-45 wehere they were considered one of the most effective weapons on the battlefield."
RHS_anti_air_equipment_1_desc:0 "The QF 3 inch 20 cwt anti-aircraft gun became the standard anti-aircraft gun used in the home defence of the United Kingdom against German airships and bombers and on the Western Front in World War I. In 1939, Britain possessed approximately 500 of these guns. Initially most were in the heavy anti-aircraft (HAA) role until replaced by the new 3.7 inch gun. Some were deployed as light anti-aircraft guns (LAA) for airfield defence, being transferred to the RAF Regiment when this was formed in 1942, until more 40mm Bofors guns arrived."
RHS_anti_air_equipment_2_desc:0 "The Bofors 40 mm gun, often referred to simply as the Bofors gun,[designed in the 1930s by the Swedish arms manufacturer AB Bofors. It was one of the most popular medium-weight anti-aircraft systems during World War II, used by most of the western Allies and extensively by British Commonwealth Land and Naval Forces."
RHS_anti_air_equipment_3_desc:0 "The QF 3.7-inch AA was Britain's primary heavy anti-aircraft gun during World War II. Production began in 1937 and it was extensively by all Commonwealth armies throughout the war, in all theatres (except the Eastern Front). It remained in use after the war until AA guns were replaced by guided missiles beginning in 1957. The 3.7 was also employed extensively as field artillery - typically for counter-battery or counter-mortar fire - during the second half of the war, in Italy, North-West Europe, Burma and the South-West Pacific."
 
RHS_gw_tank_equipment:0 "Mark V"
RHS_gw_tank_equipment_short:0 "Mark V"
RHS_light_tank_equipment_1:0 "Vickers Tank, Light, Mk VI"
RHS_light_tank_equipment_1_short:0 "Vickers Mk VI"
RHS_light_tank_equipment_1_desc:0 "The Tank, Light, Mk VI was the sixth in the line of light tanks built by Vickers-Armstrongs for the British Army during the interwar period. Production of the Mk VI began in 1936 and ended in 1940 with 1,682 Mark VI tanks having been built. Like many of its predecessors, the Mark VI was used by the British Army to perform imperial policing duties in British India and other colonies in the British Empire, a role for which it and the other Vickers-Armstrongs light tanks were found to be well suited."
RHS_light_tank_equipment_2:0 "Infantry Tank Mark II, Matilda, (A12)"
RHS_light_tank_equipment_2_short:0 "Matilda, (A12)"
RHS_light_tank_equipment_2_desc:0 "With its heavy armour, the Matilda II was an excellent infantry support tank but with somewhat limited speed and armament. It was the only British tank to serve from the start of the war to its end, although it is particularly associated with the North Africa Campaign where it was dubbed as the "Queen of the Desert" due to the inability of Italian AT guns to pierce her armour. It was replaced in front-line service by the lighter and less costly Infantry Tank Mk III Valentine beginning in late 1941."
RHS_light_tank_equipment_3:0 "Tank, Infantry, Mk III, Valentine"
RHS_light_tank_equipment_3_short:0 "Valentine QF 75mm"
RHS_light_tank_equipment_3_desc:0 "The Valentine was an infantry tank produced in the United Kingdom and Canada during the Second World War. British and Canadian production totalled 8,275, making the Valentine the most produced British tank design of the war, in eleven MKs, plus various specialised variants. The many variants included riveted and welded construction, petrol and diesel engines and a progressive increase in armament. Developed by Vickers, it proved to be both strong and reliable and was supplied in large numbers to the USSR."
RHS_light_tank_artillery_equipment_1:0 "Birch"
RHS_light_tank_artillery_equipment_1_short:0 "Birch"
RHS_light_tank_artillery_equipment_1_desc:0 "The Birch Gun was the world's first practical self-propelled artillery gun, built at the Royal Arsenal, Woolwich in 1925. Named after General Sir Noel Birch, who was Master General of Ordnance at the time, the Birch gun comprised a Vickers Medium Mark II tank chassis originally fitted with a QF 18 pdr (83.8 mm). It would be another decade before the British Army returned to the concept of tracked artillery."
RHS_light_tank_artillery_equipment_2:0 "Matilda II Mk IV Close Support (CS)"
RHS_light_tank_artillery_equipment_2_short:0 "Matilda II (CS)"
RHS_light_tank_artillery_equipment_2_desc:0 "This variant of the Matilda II saw it fitted with QF 3 inch (76 mm) howitzer, firing high explosive or smoke shells. In British service these were generally used by HQ units (usually a single command vehicle), whereas entire Australian squadrons often appear to have used them – frequently in a direct fire role, against Japanese strong points. The Australian Armoured Corps used these Matilda II tanks until the closing days of the Second World War."
RHS_light_tank_artillery_equipment_3:0 "Ordnance QF 25-pdr on Carrier Valentine 25-pdr Mk 1 "Bishop""
RHS_light_tank_artillery_equipment_3_short:0 "Bishop QF 25-pdr"
RHS_light_tank_artillery_equipment_3_desc:0 "The Bishop was a British self-propelled artillery vehicle based on the Valentine tank and armed with the 25 pounder gun-howitzer. A result of a rushed attempt to create a self-propelled gun, the vehicle had numerous problems, was produced in limited numbers and was soon replaced by better designs. The Bishop first saw action during the Second Battle of El Alamein in North Africa and remained in service during the early part of the Italian Campaign. To increase range, crews would build large earthen ramps and run the Bishop onto them, tilting the vehicle back to increase the elevation."
RHS_light_tank_destroyer_equipment_3:0 "Archer"
RHS_light_tank_destroyer_equipment_3_short:0 "Archer"
RHS_light_tank_destroyer_equipment_3_desc:0 "The Self Propelled 17pdr, Valentine, Mk I, Archer was a British self propelled anti-tank gun[2] of the Second World War based on the Valentine infantry tank chassis fitted with an Ordnance QF 17 pounder gun. Designed and manufactured by Vickers-Armstrongs, 655 were produced between March 1943 and May 1945. It was used in North-West Europe and Italy during the war; where it served with crews from the Royal Artillery rather than the Tank Corps. This vehicle was unusual in that its gun faced the rear of the chassis instead of the front."
RHS_light_tank_destroyer_equipment_1:0 "Deacon"
RHS_light_tank_destroyer_equipment_1_short:0 "Deacon"
RHS_light_tank_destroyer_equipment_1_desc:0 "The Deacon was developed in 1942 to provide British Army units in North Africa with a mobile anti-tank weapon. It can be seen as a development of the practice of carrying smaller artillery pieces en portee (sitting on the back of trucks). This meant that the artillery could quickly move albeit with some loss of traverse. The basis of the Deacon Gun Carrier was an AEC Matador truck chassis. A 6-pounder gun with enclosed armoured shield was mounted on the flat bed at the rear of the chassis."
RHS_light_tank_destroyer_equipment_2:0 "Matilda II - A27 turret"
RHS_light_tank_destroyer_equipment_2_short:0 "Matilda II 6pdr"
RHS_light_tank_destroyer_equipment_2_desc:0 "Matilda II with modified chassis and Ordnance QF 6 pounder in an A27 turret. One produced, no documentation other than photographs of it remain."
RHS_light_tank_aa_equipment_1:0 "Vickers II AA"
RHS_light_tank_aa_equipment_1_short:0 "Vickers II AA"
RHS_light_tank_aa_equipment_2:0 "Matilda AA"
RHS_light_tank_aa_equipment_2_short:0 "Matilda AA"
RHS_light_tank_aa_equipment_3:0 "Valentine AA"
RHS_light_tank_aa_equipment_3_short:0 "Valentine AA"

RHS_medium_tank_equipment_1:0 "Cruiser, Mk VI, Crusader (A15)"
RHS_medium_tank_equipment_1_short:0 "Crusader (A15)"
RHS_medium_tank_equipment_1_desc:0 "The A.15 Tank, Cruiser, Mk VI or Crusader was one of the primary British cruiser tanks during the early part of the Second World War. Over 5,000 tanks were manufactured and they made important contributions to the British victories during the North African Campaign. The Crusader tank would not see active service beyond Africa, but the chassis of the tank was modified to create anti-aircraft, fire support, observation, communication, bulldozer and recovery vehicle variants."
RHS_medium_tank_equipment_2:0 "Cruiser, Mk VIII, Cromwell (A27M)"
RHS_medium_tank_equipment_2_short:0 "Cromwell (A27M)"
RHS_medium_tank_equipment_2_desc:0 "The Cromwell tank, officially Tank, Cruiser, Mk VIII, Cromwell (A27M), was one of the series of cruiser tanks fielded by Britain in the Second World War.\nNamed after the English Civil War leader Oliver Cromwell, the Cromwell was the first tank put into service by the British to combine high speed from a powerful and reliable engine (the Rolls-Royce Meteor), and reasonable armour.\n\nThe Cromwell first saw action in the Battle of Normandy in June 1944 with 7th, 11th and the Guards Armoured Division."
RHS_medium_tank_equipment_3:0 "Tank, Cruiser, Comet I (A34)"
RHS_medium_tank_equipment_3_short:0 "Comet (A34)"
RHS_medium_tank_equipment_3_desc:0 "The Comet tank or Tank, Cruiser, Comet I (A34) was a British cruiser tank that first saw use near the end of World War II during the Invasion of Germany. It was designed as an improvement on the earlier Cromwell tank, mounting the new 77 mm HV gun in a new lower profile and part-cast turret. This gun was effective against late-war German tanks, including the Panther at medium range, and the Tiger.The Comet saw action in the closing stages of World War II and remained in British service until 1958."
RHS_medium_tank_destroyer_equipment_1:0 "Crusader II, Gun Tractor Mk I"
RHS_medium_tank_destroyer_equipment_1_short:0 "Crusader Gun Tractor"
RHS_medium_tank_destroyer_equipment_1_desc:0 "The Crusader gun tractor came out of a need for a vehicle to tow the heavy QF 17 pounder anti-tank gun. It was a Crusader tank hull with a simple boxy superstructure replacing that of the gun tank. The 14 mm thick structure protected the driver and the gun crew of six. The tractor also carried ammunition on the rear and within the crew area. They were used in northwest Europe from the Normandy landings of 1944 to the end of the war in 1945."
RHS_medium_tank_destroyer_equipment_2:0 "17pdr Self Propelled "Achilles""
RHS_medium_tank_destroyer_equipment_2_short:0 "Achilles"
RHS_medium_tank_destroyer_equipment_2_desc:0 "The 17pdr SP Achilles (officially 17 pounder, Self-Propelled, Achilles) was a British variant of the American M10 tank destroyer armed with the British Ordnance QF 17 pounder high-velocity 76.2 mm (3 inch) anti-tank gun in place of the M10's considerably less powerful 3 inch (76.2 mm) Gun M7. A total of 1,100 M10s were converted to Achilles, making it the second most numerous armoured fighting vehicle to carry the 17 pounder gun, behind the Sherman Firefly. The name "Achilles" was officially a designation applied to both the 3" gun and 17 pounder versions."
RHS_medium_tank_destroyer_equipment_3:0 "Sherman Firefly"
RHS_medium_tank_destroyer_equipment_3_short:0 "Firefly"
RHS_medium_tank_destroyer_equipment_3_desc:0 "The Sherman Firefly was a tank used by the United Kingdom and some Commonwealth and Allied armoured formations in the Second World War. It was based on the US M4 Sherman, but fitted with the powerful 3-inch (76.2 mm) calibre British 17-pounder anti-tank gun as its main weapon. Originally conceived as a stopgap until future British tank designs came into service, the Sherman Firefly became the most common vehicle mounting the 17-pounder in the war."
RHS_medium_tank_artillery_equipment_1:0 "25pdr SP, tracked, Sexton I"
RHS_medium_tank_artillery_equipment_1_short:0 "Sexton I"
RHS_medium_tank_artillery_equipment_1_desc:0 "The 25pdr SP, tracked, Sexton was a self-propelled artillery vehicle of the Second World War. It was based on Canadian-built derivatives of the American M3 Lee and M4 Sherman tank chassis, which entered production in Canada as the Ram and Grizzly. The Canadian Army Engineering Design Branch through the Canadian government's Department of Munitions and Supply were asked to build a vehicle similar to the M7 "Priest" on the Ram tank chassis."
RHS_medium_tank_artillery_equipment_2:0 "25pdr SP, tracked, Sexton II"
RHS_medium_tank_artillery_equipment_2_short:0 "Sexton II"
RHS_medium_tank_artillery_equipment_2_desc:0 "The Grizzly-based Sexton was designated the Sexton Mark II. Canadian production of tanks was switched over in 1943 to produce Sextons, to provide the British Army a mobile artillery gun using their Ordnance QF 25 pounder howitzer. It found use in the Canadian and British Army, as well as numerous other British Empire and associated forces. British orders for the Sexton II eventually totalled 2,026 vehicles."
RHS_medium_tank_artillery_equipment_3:0 "Sexton Supercharge"
RHS_medium_tank_artillery_equipment_3_short:0 "Sexton Supercharge"
RHS_medium_tank_artillery_equipment_3_desc:0 "The Grizzly-based Sexton was designated the Sexton Mark II. Canadian production of tanks was switched over in 1943 to produce Sextons, to provide the British Army a mobile artillery gun using their Ordnance QF 25 pounder howitzer. It found use in the Canadian and British Army, as well as numerous other British Empire and associated forces. British orders for the Sexton II eventually totalled 2,026 vehicles."
RHS_medium_tank_aa_equipment_1:0 "Crusader AA"
RHS_medium_tank_aa_equipment_1_short:0 "Crusader AA"
RHS_medium_tank_aa_equipment_1_desc:0 "A Crusader armed with twin Oerlikon 20 mm guns for anti-aircraft use and a single .303 Vickers GO machine gun.[16] The turret was a small polygonal turret with heavy armour, but poor situational visibility for spotting approaching aircraft.Due to Allied air superiority over the battlefields of north-west Europe, none of the AA versions saw much action against aircraft but a few - especially with the 1st Polish Armoured Division - were used against ground targets. The AA troops - attached to HQ squadrons - were disbanded after the Normandy landings."
RHS_medium_tank_aa_equipment_2:0 "Centaur AA"
RHS_medium_tank_aa_equipment_2_short:0 "Centaur AA"
RHS_medium_tank_aa_equipment_2_desc:0 "Two versions of this anti-aircraft variant were built. The first was equipped with a Crusader III, Anti-Aircraft Mk II turret with two 20 mm (0.79 in) Polsten guns for anti-aircraft support on D-Day. 95 were built, later called Mark I. The Mark II AA used the Crusader III, AA Mk III turret."
RHS_medium_tank_aa_equipment_3:0 "Tank AA, 20 mm Quad, Skink"
RHS_medium_tank_aa_equipment_3_short:0 "Skink"
RHS_medium_tank_aa_equipment_3_desc:0 "Skink was a Canadian self-propelled anti-aircraft gun, developed in 1943–44, in response to a requirement from the First Canadian Army. This dwindled to zero in late July 1944, when 21st Army Group decided that as the German air force - the Luftwaffe - had been virtually eliminated over North West Europe, there was no longer a requirement for self-propelled anti-aircraft guns. The Skink contract was cancelled in mid-August and only three complete vehicles and eight turret kits were completed."

RHS_heavy_tank_equipment_1:0 "Vickers A1E1 'Independent'"
RHS_heavy_tank_equipment_1_short:0 "Vickers A1E1"
RHS_heavy_tank_equipment_1_desc:0 "The Independent A1E1 is a multi-turreted tank that was designed by the British armaments manufacturer Vickers between the First and Second World Wars. Although it only ever reached the prototype stage and only a single example was built, it influenced many other tank designs. The A1E1 design can be seen as a possible influence on the Soviet T-100 and T-28 tanks, the German Neubaufahrzeug tanks, and the British Medium Mk III and Cruiser Mk I (triple turret) tank designs."
RHS_heavy_tank_equipment_2:0 "The Tank, Infantry, Mk IV (A22) Churchill"
RHS_heavy_tank_equipment_2_short:0 "Churchill (A22)"
RHS_heavy_tank_equipment_2_desc:0 "Named after British General John Churchill, A22 was a British heavy infantry tank used in the Second World War, best known for its heavy armour, large longitudinal chassis with all-around tracks with multiple bogies, its ability to climb steep slopes, and its use as the basis of many specialist vehicles. The Churchill was used by British and other Commonwealth forces during the North African, Italian and North-West Europe campaigns. In addition, 344 Churchills were exported to the Soviet Union and saw active service on the Eastern Front."
RHS_heavy_tank_equipment_3:0 "Tank, Infantry, Black Prince (A43)"
RHS_heavy_tank_equipment_3_short:0 "Black Prince (A43)"
RHS_heavy_tank_equipment_3_desc:0 "Black Prince (A43) is the name that was assigned to an experimental development of the Churchill tank with a larger, wider hull. It was named after Edward, the Black Prince, a famous 14th century military leader.A larger gun than that carried carried by a conventional Churchill required a larger turret on a wider turret ring and consequently a widening of the tank hull. Black Prince marked the end of the development of the Churchill Tank, and the end of the Infantry tank concept in British tank design."
RHS_heavy_tank_artillery_equipment_1:0 "Gun Carrier Mk. I"
RHS_heavy_tank_artillery_equipment_1_short:0 "Gun Carrier Mk. I"
RHS_heavy_tank_artillery_equipment_1_desc:0 "The Gun Carrier Mark I was a British vehicle of the First World War. The gun carrier was designed to transport a 6-inch howitzer or a 60-pounder gun forward soon after an attack to support infantry in advanced positions. Gun carriers were first used in the Battle of Pilckem Ridge (31 July – 2 August 1917) during the Third Battle of Ypres (31 July – 10 November 1917). The 6-inch howitzer could be fired while mounted, making the Gun Carrier Mark I the first modern self-propelled gun, a weapon capable of independent action and having tactical mobility on the battlefield."
RHS_heavy_tank_artillery_equipment_2:0 "Churchill Armoured Vehicle Royal Engineers"
RHS_heavy_tank_artillery_equipment_2_short:0 "Churchill AVRE"
RHS_heavy_tank_artillery_equipment_2_desc:0 "Proposed by a Canadian engineer as a result of experience from the Dieppe Raid, the Assault Vehicle Royal Engineers was a Churchill Mark III or IV equipped with the "Mortar, Recoiling Spigot, Mark II" (or Petard), a 290 mm (11 in) spigot mortar that throws the 40 lb (18 kg) Bomb Demolition Number 1 ("Flying dustbin") with a 28-pound high-explosive warhead. The Petard, developed by MD1, was designed for the quick levelling of fortifications. By the time of the invasion of France in June 1944, 180 AVREs had been converted."
RHS_heavy_tank_artillery_equipment_3:0 "Black Prince AVRE"
RHS_heavy_tank_artillery_equipment_3_short:0 "Black Prince AVRE"
RHS_heavy_tank_destroyer_equipment_2:0 "Churchill Gun Carrier"
RHS_heavy_tank_destroyer_equipment_2_short:0 "Churchill Gun Carrier"
RHS_heavy_tank_destroyer_equipment_2_desc:0 "Coming out of a General Staff request in 1941 to investigate fitting high velocity guns on tanks.A fixed 88 mm (3.5 in) thick superstructure with the gun in a ball mount was installed on the chassis of a Churchill. The gun was an otherwise obsolete 3-inch 20 cwt anti-aircraft gun. Fifty were built in 1942, but none are known to have been used in combat as the 17 pounder anti-tank gun gave the British the necessary firepower."
RHS_heavy_tank_destroyer_equipment_3:0 "Hector"
RHS_heavy_tank_destroyer_equipment_3_short:0 "Hector"
RHS_heavy_tank_aa_equipment_2:0 "Churchill AA"
RHS_heavy_tank_aa_equipment_2_short:0 "Churchill AA"
RHS_heavy_tank_aa_equipment_3:0 "Black Prince Marksman"
RHS_heavy_tank_aa_equipment_3_short:0 "Black Prince Marksman"
RHS_modern_tank_equipment_1:0 "Centurion"
RHS_modern_tank_equipment_1_short:0 "Centurion (A41)"
RHS_modern_tank_equipment_1_desc:0 "The Centurion was the primary British main battle tank of the post-Second World War period. Introduced in 1945, it is widely considered to be one of the most successful post-war tank designs, remaining in production into the 1960s, and seeing combat in the front lines into the 1980s. The chassis was also adapted for several other roles, and these have remained in service to this day."
RHS_modern_tank_destroyer_equipment_1:0 "Centurion Malkara"
RHS_modern_tank_destroyer_equipment_1_short:0 "Centurion Malkara"
RHS_modern_tank_artillery_equipment_1:0 "Centurion AVRE"
RHS_modern_tank_artillery_equipment_1_short:0 "Centurion AVRE 105"
RHS_modern_tank_artillery_equipment_1_desc:0 "Combat Engineer Version armed with 105 mm gun"
RHS_modern_tank_aa_equipment_1:0 "Centurion Marksman"
RHS_modern_tank_aa_equipment_1_short:0 "Centurion Marksman"
RHS_modern_tank_aa_equipment_1_desc:0 "Fitted with Marksman air defence turret - This did not happen even in prototype until around the late 1960s-early 197-s but if you have made it this far through a game and need these then I wish you Good Luck."
RHS_super_heavy_tank_equipment_1:0 "Tortoise heavy assault tank (A39)"
RHS_super_heavy_tank_equipment_1_short:0 "Tortoise (A39)"
RHS_super_heavy_tank_equipment_1_desc:0 "The Tortoise was a British heavy assault gun design developed during the Second World War, but never put into mass production. It was developed for the task of clearing heavily fortified areas such as the Siegfried Line and as a result favoured armour protection over mobility. Although heavy, at 78 tons, and not readily transported, it was considered reliable and a good gun platform. Only a few prototypes of the Tortoise had been produced by the end of the war."
RHS_super_heavy_tank_destroyer_equipment_1:0 "Iron Duke"
RHS_super_heavy_tank_destroyer_equipment_1_short:0 "Iron Duke"
RHS_amphibious_tank_equipment_1:0 "Valentine DD"
RHS_amphibious_tank_equipment_1_desc:0 "Valentine Mk V, IX and Mk XI, were made amphibious by the use of Nicholas Straussler's "Duplex Drive". Conversions by Metro-Cammell of 625 British built Valentine tanks were delivered in 1943–1944. Used by crews training for the M4 Sherman DD tanks for the Normandy Landings as well as training in Italy and India. A few were used in Italy in 1945."
RHS_amphibious_tank_equipment_2:0 "Cromwell DD"
RHS_amphibious_mechanized_equipment_1:0 "Terrapin (4-ton amphibian)"
RHS_amphibious_mechanized_equipment_1_short:0 "Terrapin"
RHS_amphibious_mechanized_equipment_1_desc:0 "Terrapins served with the Royal Engineer assault teams of the 79th Armoured Division and were used to carry infantry units (Canadian and British) over rivers. Due to a shortage of US-manufactured DUKWs, the British Ministry of Supply commissioned Thornycroft to design an amphibious vehicle capable of ferrying supplies and troops from ship to shore for the D-Day landings. Some 500 Terrapin Mark 1 were built by Morris Commercial, the commercial vehicle side of Morris Motors Limited."
RHS_amphibious_mechanized_equipment_2:0 "LVT-4 Buffalo"
RHS_amphibious_mechanized_equipment_2_short:0 "LVT-4"
RHS_amphibious_mechanized_equipment_2_desc:0 "the LVT-4 Buffalo was by far the most numerous version of the LVT, with 8,348 units delivered; the US Army received 6,083, and the British Army 500. Many of the British LVT-4 were armed with a 20 mm Polsten cannon and 2 × .30 in (7.62 mm) Browning machine guns."

RHS_mechanized_equipment_1:0 "Bren Carrier LP"
RHS_mechanized_equipment_1_short:0 "Bren Carrier"
RHS_mechanized_equipment_2:0 "Universal Carrier LP"
RHS_mechanized_equipment_2_short:0 "Universal Carrier"
RHS_mechanized_equipment_3:0 "Windsor Carrier LP"
RHS_mechanized_equipment_3_short:0 "Windsor Carrier"
RHS_mechanized_equipment_1_desc:0 "The Universal Carrier, also known as the Bren Gun Carrier and sometimes simply the Bren Carrier from the light machine gun armament, is a common name describing a family of light armoured tracked vehicles built by Vickers-Armstrongs and other Commonwealth companies. The vehicle was used widely by British Commonwealth forces during the Second World War. Universal Carriers were usually used for transporting personnel and equipment, mostly support weapons, or as machine gun platforms. With some 113,000 built by 1960 in the United Kingdom and abroad, it is the most produced armoured fighting vehicle in history."
RHS_mechanized_equipment_2_desc:0 "The Universal Carrier, also known as the Bren Gun Carrier and sometimes simply the Bren Carrier from the light machine gun armament, is a common name describing a family of light armoured tracked vehicles built by Vickers-Armstrongs and other Commonwealth companies. The vehicle was used widely by British Commonwealth forces during the Second World War. Universal Carriers were usually used for transporting personnel and equipment, mostly support weapons, or as machine gun platforms. With some 113,000 built by 1960 in the United Kingdom and abroad, it is the most produced armoured fighting vehicle in history."
RHS_mechanized_equipment_3_desc:0 "The Universal Carrier, also known as the Bren Gun Carrier and sometimes simply the Bren Carrier from the light machine gun armament, is a common name describing a family of light armoured tracked vehicles built by Vickers-Armstrongs and other Commonwealth companies. The vehicle was used widely by British Commonwealth forces during the Second World War. Universal Carriers were usually used for transporting personnel and equipment, mostly support weapons, or as machine gun platforms. With some 113,000 built by 1960 in the United Kingdom and abroad, it is the most produced armoured fighting vehicle in history."

