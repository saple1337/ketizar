RHS_federation_of_rhodesia_nyasaland_ADJ:0 "Rhodesian"

RHS_police_tt:0 "The British South Africa Police will be deployed to help maintain internal security"
RHS_regiment_tt:0 "The Regiment will undertake preparations to be ready for mobilisation at the outbreak of war."

#############
### IDEAS ###
#############

RHS_rhodesian_tobacco_exports:0 "Rhodesian Tobacco Exports"
RHS_rhodesian_tobacco_exports_desc:0 "Production of the colony's most important cash crop, tobacco, was high throughout the war, averaging about 40 million pounds (18 million kg) annually. This had a significant, if often subtle, effects on the morale of Commonwealth troops as they would always be able to enjoy a cigarette with a high ratio of tobacco (most troops became smokers eventually}.\n\nThis is in stark contrast to the quality received by German and Italian troops who faced a constant reminder of the eceonomic strain of the war on their countries every time they wanted to smoke."
RHS_bread_basket_of_africa:0 "The Bread Basket of Africa"
RHS_bread_basket_of_africa_desc:0 "Southern Rhodesia possesses remarkably fertile soils which have proven ideal for agriculture. As a result Rhodesian agriculture is significantly more productive than other regional producers, especially when considering Rhodesia's low population density.\n\nThis bounty however comes at a cost, the fields are predominantly worked by native sharecropper farmers and agricultural workers who earn much less than their european counterparts. The agricultural industry is critically reliant on this stream of labour, but this denies manpower to other sectors of the economy and the Rhodesian army."
RHS_wankie_wildlife_tourism:0 "Wankie Game Reserve Tourism"
RHS_wankie_wildlife_tourism_desc:0 "The steady revival of the wild animal populations in Wankie Game Reserve has led to a revival in our decrepit tourism industry. While the expense is one that is beyond the means of almost everyone but the wealthy, the revival of the industry is bringing a much needed cash injection into the economy, with many of the tourists choosing to settle in Southern Rhodesia after visiting this exotic and beautiful land."

RHS_copper_belt:0 "Rhodesian Copper Belt"
RHS_copper_belt_desc:0 "The Copper mines of Northern Rhodesia are one of the most important resources in Central Africa. The value of copper comes from their crucial role in the production of electronics which are seemingly appearing in every type of modern military equipment."
RHS_copper_belt_2:0 "Rhodesian Copper Belt"
RHS_copper_belt_2_desc:0 "The Copper mines of Northern Rhodesia are one of the most important resources in Central Africa. The value of copper comes from their crucial role in the production of electronics which are seemingly appearing in every type of modern military equipment."

RHS_southern_rhodesia_air_force:0 "The Southern Rhodesian Air Force"
RHS_southern_rhodesia_air_force_desc:0 "The wild expanses of Africa raise the importance of aircraft and airpower to achieving success on the battlefield. While we wish to prove our support to Britain we should ensure that we retain operational command over our air forces to guarantee they are available for operations within Africa when needed."
RHS_supporting_the_raf:0 "Supporting the RAF"
RHS_supporting_the_raf_desc:0 "The British Isles stand on the frontline of the war against Germany and are consequently under the constant threat of air attack. Rhodesia’s Airforce is small and it therefore makes sense for us to fully integrate our airmen with the Royal Air Force so they can help Britain in her hour of need, and have a greater chance of giving Jerry a bloody nose."

RHS_nyasaland_recruits:0 "Nyasaland KAR Battalions"
RHS_rhodesian_special_forces:0 "Rhodesian Special Forces"
RHS_armoured_car:0 "Armoured Car Detachments"
RHS_lrdg:0 "Long Range Desert Group"

RHS_colonial_service_transferred:0 "Colonial Service Secondments"
RHS_colonial_service_transferred_desc:0 "With the majority of the junior District Officers being seconded to the Army, many aspects of the colony's administration are being neglected."
RHS_colonial_service_replacements:0 "Native Administrators"
RHS_colonial_service_replacements_desc:0 "Native administrators are being employed to help ease the burden on the remaining Colonial Service Staff."


#################
### DECISIONS ###
#################

ENG_RHS_nyasaland_recruitment:0 "Nyasaland Recruitment Campaign"
ENG_RHS_nyasaland_recruitment_desc:0"Recruitment from the native tribes of Nyasaland into the army is proving to be suprisingly simple. All we need to show is the high wages available in the army and examples of the Nazi’s own propaganda, describing their racist intentions, and they are more than willing to join up. Due to the rural landscape, the army has proposed mobile recruitment units manned by native soldiers to effectively spread the call to arms."
ENG_RHS_northern_rhodesia_recruitment:0 "Northern Rhodesia Recruitment Campaign"
ENG_RHS_northern_rhodesia_recruitment_desc:0 "Recruitment from the native tribes of Northern Rhodesia into the army is proving to be suprisingly simple. All we need to show is the high wages available in the army and examples of the Nazi’s own propaganda, describing their racist intentions, and they are more than willing to join up. Due to the rural landscape, the army has proposed mobile recruitment units manned by native soldiers to effectively spread the call to arms."

#################################
### SOUTHERN RHODESIA FOCUSES ###
#################################

RHS_responsible_government:0 "Responsible Government"
RHS_responsible_government_desc:0 "Since 1923 Rhodesia has been granted the status of 'Responsible Government' granting us, self government, our own Prime Minister, Cabinet and a Parliament. We are however still officially a colony of Great Britain, indeed our athletes must use her flag at the Olympics. We need to find ways to prove ourselves to the British Cabinet in order to achieve Dominion status."
RHS_bledisloe_commission:0 "Rhodesia-Nyasaland Royal Commission"
RHS_bledisloe_commission_desc:0 "The Rhodesia-Nyasaland Royal Commission, also known as the Bledisloe Commission as its chairman was Lord Bledisloe, has been organised by the British Cabinet to examine the possible closer union of Southern Rhodesia, Northern Rhodesia and Nyasaland. These territories are to some degree economically inter-dependent, and if they were unified we can easily justify us receiving Dominion status."
RHS_ignore_the_commission_findings:0 "Ignore the Commission's findings"
RHS_ignore_the_commission_findings_desc:0 "There is no majority in the Southern Rhodesian Parliament to undertake the reforms recommended by the commission. With war in Europe seeming ever more likely this is surely not the time to begin a fundemental reorganisation of our country. Instead we will prove ourselves by fully committing Southern Rhodesia to the defence of Britain and the Empire."
RHS_implement_the_commission_findings:0 "Implement the Commission's Findings"
RHS_implement_the_commission_findings_desc:0 "The Commission has made clear to us that the British Colonial Office will only agree to a union of British Central Africa if we undertake significant internal reforms to our racial and economic policies. While many of the settler classes and Rhodesian MPs will be very nervous to this change we must pursue it to secure the future of the Colony."

RHS_raise_war_taxes:0 "Raise War Taxes"
RHS_raise_war_taxes_desc:0 "Now that war has begun we will need our farmers and industrialists to supply the Empire with raw materials. However, the influx of foreign money into the economy may cause significant inflation. We will pre-empt this by implementing war taxes on the settlers who stand to benefit from the war and devote the funds to the war effort."
RHS_import_substitution_policy:0 "Import Substitution Economics"
RHS_import_substitution_policy_desc:0 "British East and Central Africa have always depended on imported machinery and manufactured goods from Great Britain. With the war now in full swing British exports to the colonies have completely dried up. As a result of the continued demand for such goods, several indutrialists in Rhodesia have begun to set up manufacturing facilities in Rhodesia."
RHS_fundraising_efforts:0 "Post Office Savings Bank"
RHS_fundraising_efforts_desc:0 "The [FROM.GetAdjective] branch of the Post office Savings Bank has begun fundraising through voluntary financial donations by its customers who hold savings accounts with them. The majority of the local population are taking part in this scheme, fully aware that they are helping in a small way towards securing their homes from the threat of tyranny."
RHS_eastern_group_supply_council:0 "Eastern Group Supply Council"
RHS_eastern_group_supply_council_desc:0 "The supply council being organised by British Officials in India is an excellent initiative for Rhodesia's economy. Not only will it assist the Empire's war effort but will also ensure that Rhodesian producers have secure export markets for their goods and raw materials."
RHS_compulsary_native_labour_act:0 "Compulsary Native Labour Act"
RHS_compulsary_native_labour_act_desc:0 "The owners of Rhodesia's large tobacco farms are reporting significant shortages of labour. In response the Interior Ministry has proposed a new act which would allow unemployed black males between 18 and 45 years of age to be conscripted for work on white-owned farms. While being very unpopular with the native population this should drastically increase food and cash crop production."
RHS_maintain_agricultural_system:0 "Maintain Existing Agricultural Systems"
RHS_maintain_agricultural_system_desc:0 "Africans are still heavily dependent on growing their own food crops for subsistence. While there are many demands for native manpower both overseas and at the home front, a significant proportion of the male population will still be needed to ensure food security for the native population."
RHS_rhodesian_war_cabinet:0 "Rhodesian War Cabinet"
RHS_rhodesian_war_cabinet_desc:0 "Despite the fact Southern Rhodesia only has 30 MPs in her Parliament we still run the risk of not properly coordinating the efforts of the armed forces and the economy towards the war. We will establish a War Cabinet to oversee the Colony's war effort and ensure an efficient application of our resources."
RHS_royal_visit:0 "Royal Visit"
RHS_royal_visit_desc:0 "In recognition of the contribution that Southern RHodesia and British Central Africa has made towards the Allied war effort, The Royal family have announced their intention to visit the territories. This is certainly an honour, and while it is unclear which member of the Royal Family will be attending, we will proudly appreciate their visit as a gesture to Rhodesia's loyalty to the British Empire."

RHS_african_affairs_board:0 "African Affairs Board"
RHS_african_affairs_board_desc:0 "As part of our efforts to dismantle Rhodesia's racial policies, a new standing committee known as the African Affairs Board will been set up to safeguard the interests of Africans and will be endowed with statutory powers for that purpose, particularly in regard to discriminatory legislation. Given time, these efforts will allow native africans to more actively engage with Rhodesia's politcal system."
RHS_native_civil_servants:0 "Native Civil Servants"
RHS_native_civil_servants_desc:0 "For decades there have been initiatives in the British Colonial Service to train and recruit local civil servants, however these have often been lower tier postings with limited opportunities for promotion. To overcome this obstacle we will introduce an completely Meritocratic exam process which will only evaluate applicants based on the competency for the role."
RHS_discussions_with_tribal_chiefs:0 "Discussions with the Tribal Chiefs"
RHS_discussions_with_tribal_chiefs_desc:0 "Our recent initiatives are likely to worry African tribal chiefs as they will undermine their traditional role as the centre of power in local african societies. To reassure them we will grant them life long privilages and representation into a new advisory Upper House. While they may lose their traditional power base they can still keep their titles and prestige."
RHS_discussions_with_whitehall:0 "Discussions with Whitehall"
RHS_discussions_with_whitehall_desc:0 "The changes that we are implementing in Southern Rhodesia will have a majar and lasting impact on local politics and society. Our administrative resources are very limited so we are heavily reliant on the British Colonial office to assist us. Thankfully they have dedicted significant manpower and resources to our project."
RHS_discussions_with_settlers:0 "Discussions with the Settlers"
RHS_discussions_with_settlers_desc:0 "The white settlers of Rhodesia's wealthy and middle classes have largely self funded the development of the colony into the major raw mineral and cash crop producer it is today. Many are deeply opposed to the fundemental changes we are making yo he Colony. Depsite this we must make efforts to include them in the implementation process to ensure the Colony's financnial security."
RHS_federation_of_rhodesia:0 "The Federation of Rhodesia"
RHS_federation_of_rhodesia_desc:0 "Southern Rhodesia's extensive reform efforts have convinced the Colonial Office and the British Cabinet that we can now responsibly manage a union of Northern and Southern Rhodesia under a federal structure. Similar efforts have been underway in Northern Rhoesia to ensure a seemless transition."
RHS_native_buisness_grants:0 "Native Buisness Grants"
RHS_native_buisness_grants_desc:0 "To stimulate the economic potential of the newly enfranchised african population the Federal Government will introduce buisness grants that all members of the population will have the opportunity to apply for, provided they have submitted a sound buisness proposal."
RHS_incorporate_nyasaland:0 "Incorporate Nyasaland"
RHS_incorporate_nyasaland_desc:0 "Nyasaland has always been an outlier in British Colonial Policy, While administratively it has been included in British Central Africa it has far more economic and military links with British East Africa. Despite this the Colonial Office is concerned that the territory will be left outside of either region and has requested that it be incorporated into the Federation."
RHS_compulsory_primary_education:0 "Compulsory Primary Education"
RHS_compulsory_primary_education_desc:0 "While there have been significant programmes to bring primary education to all native african children they have often fallen short due to their parents needing assistance on their farms. Our new education policy will make schooling mandatory for all children to increase their future opportunities and increase their personal investment in the Federation."
RHS_regimental_system:0 "British Regimental System"
RHS_regimental_system_desc:0 "There is still currently very few physical connections between the territories that make up the Federation. The British Regimental System that roughly follows county identities will be a good model for the Federation's armed forces and military service will provide interaction between communities across the Federation."
RHS_rhodesia_dominion:0 "The Dominion of Rhodesia and Nyasaland"
RHS_rhodesia_dominion_desc:0 "The Economic and Political rise of the Federation of Rhodesia and Nyasaland has led the Prime Minister to travel to London to request the right for Rhodesia to sign the Statute of Westminster and join South Africa, Australia, Canada and New Zealand as a Dominion of the British Empire."

RHS_efficient_land_distribution:0 "Implement 'Efficient' Land Distribution"
RHS_efficient_land_distribution_desc:0 "The white settler class in Rhodesia has been central to the economic development of Southern Rhodesia. However the majority of rural land is owned by native landowners are less productive due to a lack of private capital. There is significant political support among the settler class for a redistribution of native land to the productive settlers. This will be very divisive and will have repurcussions for decades."
RHS_anglophile_immigration_campaign:0 "Anglophile Immigration Campaign"
RHS_anglophile_immigration_campaign_desc:0 "The white population of Southern Rhodesia is a ruling minority. There are approximately only 70,000 white settlers living alongside over 1.2 million natives. This rather hinders our efforts to become a white Dominion of the Empire so the Interior Ministry has devised an immigration campaign to attract settlers from across the British Empire and the United States."
RHS_expand_bsap:0 "British South African Police"
RHS_expand_bsap_desc:0 "The British South Africa Police (BSAP) is, despite its name, serves as official police force of Southern Rhodesia. Although primarily a law enforcement organisation, the line between police and military is significantly blurred. BSAP officers are trained both as policemen and regular soldiers and are expected to maintain internal security. We should reorganise this force for our defence."
RHS_reinforce_commitment_uk:0 "Reinforce British Commitments"
RHS_reinforce_commitment_uk_desc:0 "Ever since Cecil Rhodes and his followers came to this land, Rhodesians have been fiercely loyal to the British Empire, British Values and their Mother country. As Darkness appears to envelope Europe we must reinforce our commitments to Britain and show her people that they are not alone in the darkest hour."
RHS_south_africa_ties:0 "Strengthen Ties with [SAF.GetNameDef]"
RHS_south_africa_ties_desc:0 "The Dominion of South Africa has numerous cultural, historical and economic ties to Rhodesia as our pasts have been closely entwined. As we are now beginning to undergo a rapid industrial and military expansion we should pursue closer cooperation with powerhouse of Africa."
RHS_settler_orientated_policies:0 "Settler Orientated Legislation"
RHS_settler_orientated_policies_desc:0 "With Rhodesia's entry into the war we must begin efforts to coordinate the economy. Most of the underperforming areas of the economy need plenty of low cost manpower to become productive. To encourage more labour into these economic areas we will lobby the Native Chiefs to commit a quota of tribes manpower who will be paid at a fixed rate for their labour."
RHS_detain_german_sympathizers:0 "Detain German Prisoners"
RHS_detain_german_sympathizers_desc:0 "There are rumours of numerous German and Italian agents operating in British Central Africa to undermine our war efforts. As a precaution we are beginning police operations to classify those suspected as being sympathetic to the Axis powers. To ease the burden on Allied resources we will also establish internment camps"
RHS_clamp_down_labour_unrest:0 "Clamp Down on Labour Unrest"
RHS_clamp_down_labour_unrest_desc:0 "The Government has had to undertake highly unpopular economic policies in order to produce ever greater resources and materials for the war effort. This is leading many among the native farm and factory workers to consider strike actions. We must pass legislation to temporarily limit the legality of these actions and deploy the BSAP to ensure continued war production."
RHS_polish_refugee_resettlement:0 "Polish Refugee Resettlement"
RHS_polish_refugee_resettlement_desc:0 "There are many Polish refugees who are gradually making there way out of German and Soviet occupied Europe. [FROM.GetName] has considerable room for these refugees for the duration of the war. We should reach out the [POL.GetAdjective] Government in Exile to let them know that we are more than happy to accomodate their displaced people by constructing new settlements in [FROM.GetName] for them."
RHS_central_african_council:0 "Central African Council"
RHS_central_african_council_desc:0 "The war effort has drawn the colonies of British Central Africa towards the infrastructure and industry of Southern Rhodesia. In order to gain further efficency the Colonial Office has proposed a joint economic council between the Administrations of Northern and Southern Rhodesia and Nyasaland."

BAF_Church_schools:0 "Anglican and Presbytarian Schools"
BAF_Church_schools_desc:0 "Missionaries have always played a notable role in British imperial expansion and colonial rule. By the 1930s/40s however, their work was focused on improving the living conditions and education of the native populations, rather than spreading Christianity. Missionaries from the Churches of Scotland, England and Wales established elementary education facilities throughout British Africa with many still existing into the 21st Century."
RHS_anglo_american:0 "Anglo American Diversification"
RHS_anglo_american_desc:0 "Anglo American PLC is the largest mining conglomerate in Southern Africa with major stakes in the gold and mining industry in South Africa. The firm has also achieved a dominant position in Northern and Southern Rhodesia, where it is looking to diversify into iron ore and nickle extraction. By easing their expansion into these commodities both Northern and Southern Rhodesia may benefit financially."
RHS_wankie_national_park:0 "Revive Wankie Game Reserve"
RHS_wankie_national_park_desc:0 "When founding member Ted Davidson walked across the reserve in 1928-29 he discovered the wildlife was almost non existent. The once teeming herds of elephants and rhinoceros and wildebeest were almost exterminated through a combination of poaching and water scarsity. A solution has been the construction of boreholes to increase the availability of water and encourage the animals to return, along with our tourism industry."
RHS_review_balanced_budget_policy:0 "Colonial Budget Review"
RHS_review_balanced_budget_policy_desc:0 "We have ensured that our colonial authorities have not spent more than [ROOT.GetNameDefCap] have earned in tax revenue for over two decades. The Colonial Governor, [ROOT.Getleader], has decided that he will contact the Colonial Office to conduct a spending review for further infrastructure and construction projects in [ROOT.GetNameDefCap]."
RHS_rhodesian_railways_modernisation:0 "Rhodesian Railways Modernisation"
RHS_rhodesian_railways_modernisation_desc:0 "During the Scramble for Africa, Cecil Rhodes advocated the construction of a Cape to Cairo Railway, linking all British possessions along the eastern side of Africa. Rhodesian Railways grew rapdly in this period, but has since cooled off on it's developments. We should procure new locomotives and infrastructure to support this."
RHS_rhodesian_railways_expansion:0 "Rhodesian Railways Expansion"
RHS_rhodesian_railways_expansion_desc:0 "Rhodesian Railways is the state owned railway operator tasked with running the railways of Northern and Southern Rhodesia as an integrated operation, and is one of the largest employers and enterprises in both countries. Rather than engaging in costly projects to convert tracks to a standard gauge we should instead further connect the country with new branch lines to the rest of British Africa."
RHS_expand_wankie_mines:0 "Expand Wankie Colliery"
RHS_expand_wankie_mines_desc:0 "The Wankie Coal Field, one of the largest in the world, was discovered in 1895 by the American Scout Frederick Russell Burnham. The extracted coal, is transported and delivered by Rhodesian Railways and makes Wankie Colliery the main provider of coal for the whole of Southern, and parts of Northern, Rhodesia. Further expansion will assist the growth of Rhodesia’s heavy industries."
RHS_rhodesian_iron_and_steel_commission:0 "Rhodesian Iron and Steel Commission"
RHS_rhodesian_iron_and_steel_commission_desc:0 "With the majority of Britain's and South Africa's steel production being dedicated to the war effort, the government has established a commission to consider the viability of producing steel within Rhodesia. The significant deposits of iron ore and limestone, and excellent access to the railway network, make Redcliff an ideal site for the establishment of a steel plant."
RHS_gold_exports:0 "Rhodesian Gold Exports"
RHS_gold_exports_desc:0 "There are over 1,500 mines extracting and producing Gold in Southern Rhodesia employing over 75% of our miners. While most only produce on a small scale, there is significant output from the larger establishments, making Rhodesia the 2nd largest Gold exporter in the world. The Gold is transported by Rhodesian Railways to South Africa for global export and provides us with considerable tax revenue."
RHS_selukwe_chromite_mines:0 "Selukwe Schist Belt"
RHS_selukwe_chromite_mines_desc:0 "The Selukwe Schist Belt is unique in terms of its geology as it is the only place in the world where you can find both types of Chromite sediment. Thankfully Rhodesia’s mining corporations have possessed the means to extract and process this chromite to form Chromium. This resource is likely to prove vital to the Allied war effort and in particular the production of modern armoured vehicles and vessels."
RHS_mobilise_rhodesia:0 "Mobilize Rhodesia"
RHS_mobilise_rhodesia_desc:0 "Britain has announced her declaration of war and Rhodesia will proudly answer her call to arms. Even though our armed forces are small and our industry is in its infancy, we will immediately direct all of the colony’s energies towards helping Britain’s war effort. The sun will not set on the British Empire until we have given our all."
RHS_rhodesian_copper_belt:0 "The Rhodesian Copper Belt"
RHS_rhodesian_copper_belt_desc:0 "The Copper mines of Northern Rhodesia are one of the most important resources in Central Africa. Copper is crucial to the production of electronics which are seemingly appearing in every type of modern military equipment. While maintaining production is the responsibility of the British Colonial service, we could offer divert manpower and capital towards increasing production for the war effort."
RHS_rhodesian_resource_boom:0 "Rhodesian Resource Boom"
RHS_rhodesian_resource_boom_desc:0 "Our economy is primarily based around the extraction and export of raw materials. During the 1930s the decline in demand for these resources brought about an economic depression to the region. While the war is proving extremely costly for the Empire, Northern and Southern Rhodesia are experiencing an economic boom due to the massively increased demand for the region’s resources."
RHS_rhodesian_african_rifles:0 "Rhodesian African Rifles"
RHS_rhodesian_african_rifles_desc:0 "The strength of the Axis and the threat posed by the Italian Empire in Africa is putting major strain on Commonwealth Forces. As the future of Rhodesia is directly threatened by an Axis victory we must consider raising a new regiment composed purely of native soldiers and white officers. Such a plan has will raise considerable concern among the settlers for the precedent it sets, but it may prove necessary."
RHS_mobile_propaganda_units:0 "Mobile Propaganda Units"
RHS_mobile_propaganda_units_desc:0 "Recruitment from the native tribes into the army is proving to be suprisingly simple. All we need to show is the high wages available in the army and examples of the Nazi’s own propaganda, describing their racist intentions, and they are more than willing to join up. Due to the rural landscape, the army has proposed mobile recruitment units manned by native soldiers to effectively spread the call to arms."
RHS_rhodesian_tobacco:0 "Rhodesian Tobacco"
RHS_rhodesian_tobacco_desc:0 "Tobacco is the most important crop grown in Rhodesia and its production employs a significant share of the Colony’s workforce. The rapid expansion of Commonwealth Armed forces has spawned a huge demand for tobacco in order to ensure that each soldier can have his daily ration of Tobacco. DON’T SMOKE, IT KILLS YOU."
RHS_raw_material_exports:0 "Raw Material Exports"
RHS_raw_material_exports_desc:0 "Rhodesian farmers and foresters are reporting great increases in the demand for various raw materials that the economy grows. Resources such as sisal, which is used for producing rope, and leather which is used to produce each soldier’s boots are being bought up by the industrialised nations of the Commonwealth."
RHS_increase_agricultural_officers:0 "Recruit Additional Agricultural Officers"
RHS_increase_agricultural_officers_desc:0 "The Colonial Service has recently undergone a major reorganisation which has seen Whitehall increase the number of agricultural officers in the Africa colonies. These officers are tasked with touring the native villages and tribes to provide them with advice and tuition on how to improve agricultural yields, maintain healthy animals and combat pests."
RHS_education_programmes:0 "Educational Programmes"
RHS_education_programmes_desc:0 "As part of the British mandate to assist the development of her colonies, the Colonial Service dispatches educational officers to the African colonies to organise primary and secondary education courses there. These programmes are heavily reliant however on Missionary teachers and the government funds for school supplies and meal provision."
RHS_salisbury_university:0 "University College of Rhodesia"
RHS_salisbury_university_desc:0 "The British Colonial Office has expressed concern in the lack of higher educational fcilities in British Central Africa. To remedy this the Southern Rhodesian Government has proposed the founding of a new institution in Salisbury that will be affiliated with the University of London."

RHS_expand_boac_facilities:0 "Rhodesia and Nyasaland Airways"
RHS_expand_boac_facilities_desc:0 "Rhodesia has been an enthusiastic supporter of civilian aviation for several decades. As Central Africa is landlocked, civilian aircraft are the only viable means for people to quickly travel to and from the ports in East and South Africa. Rhodesia and Nyasaland Airways have been operating these services in the region and should be convinced them to maintain the routes."
RHS_establish_sraf:0 "Establish the SRAF"
RHS_establish_sraf_desc:0 "Rhodesia is unlikely to be able to field a significant land contingent to support the British in the event of war. Many military thinkers believe that Airpower will be a new crucial dimension on the battlefield. As Rhodesia has no access to the coast, founding an auxiliary air force will allow us to effectively support the British Army and ensure the security of Rhodesia’s borders."
RHS_southern_rhodesian_air_training_school:0 "Southern Rhodesian Air Training School"
RHS_southern_rhodesian_air_training_school_desc:0 "The British Government has announced the formation of the Empire Air Training Scheme (E.A.T.S) which will provide ground and aircrew training programme for all of the Commonwealth Nations. As we are a considerable distance from the fighting theatres of the war, and have relatively clear skies for practising in, we should dedicate resources to organise a training school for the EATS scheme for the Commonwealth."
RHS_maintain_sraf:0 "Maintain the SRAF"
RHS_maintain_sraf_desc:0 "The wild expanses of Africa raise the importance of aircraft and airpower to achieving success on the battlefield. While we wish to prove our support to Britain we should ensure that we retain operational command over our air forces to guarantee they are available for operations within Africa when needed."
RHS_support_raf:0 "Integrate with the RAF"
RHS_support_raf_desc:0 "The British Isles are on the frontline of the war against Germany and consequently they are under the constant threat of air attack. Rhodesia’s Airforce is small and it therefore makes sense for us to fully integrate our airmen with the Royal Air Force so they can help Britain in her hour of need, and have a greater chance of giving Jerry a bloody nose."
RHS_tactical_squadrons:0 "No.266 and No.237 Squadron"
RHS_tactical_squadrons_desc:0 "Training our pilots and ground crews to operate fighters and ground support aircraft will greatly benefit our efforts towards achieving air superiority and close cooperation with ground forces. No.266 and No.237 Squadrons have already begun training in single engine aircraft and should receive the bulk of this training so that they can specialise in this role."
RHS_strategic_squadrons:0 "No.44 Squadron"
RHS_strategic_squadrons_desc:0 "RAF Bomber Command is confident that the war can be won by launching large bomber raids against important targets in the enemy’s heartland. Rhodesia will be able to support this objective by specialising some our air force training towards flying and maintaining multi-engine aircraft."
RHS_expand_airfield_facilities:0 "Expand Airfield Facilities"
RHS_expand_airfield_facilities_desc:0 "Southern Rhodesia has uncrowded skies that are ideal for training Commonwealth pilots in Southern Africa. The rapid expansion of our air training programme will require a significant construction effort to clear land for new runways, classrooms, messes and hangars."
RHS_ground_crew_training_school:0 "Ground Crew Training School"
RHS_ground_crew_training_school_desc:0 "Aircraft require a lot of maintenance to become flight worthy and the air war can be won or lost by the quality of our mechanics. If we do not ensure that the Commonwealth has adequate numbers of well-trained mechanics, fuel operators and ammunition handlers then we will quickly lose the test of battle."
RHS_rhodesian_air_training_group:0 "Rhodesian Air Training Group"
RHS_rhodesian_air_training_group_desc:0 "Our significant efforts have resulted in first class facilities for the training of Commonwealth ground and air crews. Historically, Rhodesia was the first Commonwealth member to establish a school under the EATS. By the end of the war the school had trained 5% of the scheme’s total graduates and the preceding investments brought about an economic boom in Rhodesia."
RHS_veteran_lecturers:0 "Veteran Lecturers"
RHS_veteran_lecturers_desc:0 "Several of the original Rhodesian graduates of the EATS have returned to Rhodesia due to injury or promotion. These airmen have considerable insight that we should direct towards the Air Training School and the development of new tactics and doctrines."
RHS_rhodesian_air_askari:0 "Rhodesian Air Askari Corps"
RHS_rhodesian_air_askari_desc:0 "As we continue to expand our air forces and the Rhodesian Air Training Group, we will need to meet the task of patrolling and defending our airfields. A volunteer force of native troops should be formed for the task and if needed they should be called upon to assist in labour tasks as well."

RHS_status_of_defence_forces:0 "Regional Defence Coordinator"
RHS_status_of_defence_forces_desc:0 "The East African Campaign against the Germans in the Great War saw for the first time significant troop deployments in British Central Africa. The region was a frontline in the campaign and in the interwar years Britain has increasingly looked to us to coordinate defensive preparations for this region of the Empire."
RHS_nyasaland_support_east_africa:0 "Nyasaland - East Africa Integration"
RHS_nyasaland_support_east_africa_desc:0 "The Nyasaland Battalions of the Kings African Rifles Regiment have historically been closely linked with the territories of British East Africa. Current War Office planning calls for these Battalions to be sent to support East Africa Command in the event of war."
RHS_nyasaland_recruit_incorporation:0 "Nyasaland - Rhodesia Integration"
RHS_nyasaland_recruit_incorporation_desc:0 "The Kings African Rifles’ have had a strong recruiting base in Nyasaland since the regiment’s inception. Current plans would see the Nyasaland Battalions being sent North to support East Africa. These units may be better placed within the Rhodesian Armed Forces however, and such a change would be politically and logistically feasible."
RHS_british_officer_secondments:0 "British Officer Secondments"
RHS_british_officer_secondments_desc:0 "Officers for British African regiments are sourced from regiments based in Britain, with junior officers being seconded to overseas for a fixed duration. This system ensures that colonial regiments have a steady supply of Sandhurst trained officers and provides the secondee with valuable experience of working with troops from overseas colonies and fighting in different climate conditions."
RHS_northern_rhodesia_regiment:0 "Northern Rhodesia Regiment"
RHS_northern_rhodesia_regiment_desc:0 "The Northern Rhodesia Regiment (NRR) is a multi-battalion British colonial regiment raised from the Protectorate of Northern Rhodesia. It was formed in 1933 from elements of the Northern Rhodesia Police, and then transitioned to the British regimental structure. Made up of native rank-and-filers and British officers, its motto was ‘Different in Race, Equal in Fidelity’."
RHS_rhodesian_regiment:0 "The Rhodesia Regiment"
RHS_rhodesian_regiment_desc:0 "The Regiment was reformed in 1927 and recruited from the settler population of Southern Rhodesia. In 1939 all eligible settlers were conscripted, enlisted and trained into the Regiment before dispersal to their respective units. Following the War, King George VI renamed them the ‘Royal Rhodesia Regiment’ in recognition of their service."
RHS_kings_african_rifles:0 "Nyasaland KAR"
RHS_kings_african_rifles_desc:0 "Many Nyasas came to fight for the British during the war, primarily as soldiers of the King's African Rifles (KAR). By August 1942 a total of 16,400 Nyasas were serving in the KAR, as compared to roughly 2,000 at the war's start. Out of a total 43 KAR battalions, 12 hailed from Nyasaland."
RHS_royal_artillery_support:0 "Royal Artillery Detachments"
RHS_royal_artillery_support_desc:0 "The British Army places significant emphasis on the effective use of artillery in battle. As such many within the Army have endorsed plans to raise native artillery regiments in Britain’s overseas territories to ease the burden on the Royal Artillery (RA). These forces will receive tuition from the RA and will be provided with 18 Pounder guns until the 25 Pounder can be supplied."
RHS_royal_army_pioneer_corps:0 "Royal Army Pioneer Corps"
RHS_royal_army_pioneer_corps_desc:0 "Over 100 thousand Africans enlisted into the Royal Pioneer Corps during the war and undertook the lighter engineering tasks of the Pioneer Corps such as digging slit trenches, constructing supply routes and building anti-aircraft emplacements. Pioneers also carried stretchers, built airfields, repaired railways, and moved stores and supplies."
RHS_setup_enfield_production_line:0 "Domestic Small Arms Industry"
RHS_setup_enfield_production_line_desc:0 "The significant distance separating [Root.GetNameDef] from the UK is likely to lead to significant disruption of equipment and supplies to our armed forces. As we have pre-existing local manufacturing facilities it would make strategic sense for us to establish our own small arms production line to ensure that we can at least ensure our troops have their Enfields."
RHS_military_cooperation:0 "Commonwealth Military Cooperation"
RHS_military_cooperation_desc:0 "British Central Africa is not predicted to be on the frontline of the next major conflict and therefore our forces will be required to be sent to assist other British theatres. Moving large numbers of troops requires considerable preparation but the Dominions of the Empire have offered to help us overcome thee challenges as they did during the Great war."
RHS_support_south_african_army:0 "Support the South African Army"
RHS_support_south_african_army_desc:0 "As our armed forces are relatively small we need to prioritise which allies we are going to integrate with more closely. In the last war Rhodesia cooperated with South Africa in the East African Campaign. We should replicate this position and try to integrate our land forces with the increasingly mechanised South African Army."
RHS_south_african_industry_support:0 "South African Industrial Support"
RHS_south_african_industry_support_desc:0 "South Africa’s increasing industrialisation makes it the economic powerhouse of Africa. As we have expressed our interest in integrating with South African Army formations their government has increased their industrial support to our economy to ensure that our forces are properly equipped."
RHS_support_east_african_army:0 "Support East African Command"
RHS_support_east_african_army_desc:0 "The main threat to Britain’s position in Africa comes from the Italian East African Colonies. East Africa Command has been formed to organise the defences of the region, and therefore Rhodesia. We should prioritise integrating our forces with East African Command and remove the Italian threat as soon as possible."
RHS_mobilise_rhodesian_railways:0 "Extend Rhodesian Railways"
RHS_mobilise_rhodesian_railways_desc:0 "Currently the railways in Northern and Southern Rhodesia extend only to the Tanganyika border. As we will be deploying our forces North to assist East African Command we should construct a new railway North into Tanganyika to ensure adequate logistical support for our forces."
RHS_provide_support_troops:0 "Anti-aircraft Regiments"
RHS_provide_support_troops_desc:0 "To support East Africa Command in their operations against the Italians, the Rhodesian Land forces commander has agreed that Southern Rhodesia will take over anti aircraft duties for British East Africa withsome newly established anti aircraft regiments."
RHS_special_forces_policy:0 "Specialist Forces Policy"
RHS_special_forces_policy_desc:0 "Rhodesia does not have a large settler population and the experience of the South African Brigade in the Somme Battle proves that we cannot risk losing the core of our nations manpower in one bad battle. We have agreed with the British Government that we will spread Rhodesia’s manpower into Specialist British Formations such as the LRDG and the Commandos to limit the colony’s losses."
RHS_rhodesian_divisions:0 "Form Rhodesian Divisions"
RHS_rhodesian_divisions_desc:0 "Despite the risk to our small population, we should form a Rhodesian Division. The Dominions of the Commonwealth achieved a unifying national spirit that was nurtured within their national formations. If we allow the inclusion of native soldiers within our formations, then we will be able to raise sufficient numbers of men to form divisions."
RHS_long_range_desert_group:0 "Long Range Desert Group"
RHS_long_range_desert_group_desc:0 "Middle East Command has created a unit which is specialised in Long Range Desert Navigation in vehicles. Primarily composed of New Zealanders and with a focus on intelligence activities the LRDG seems to be an ideal organisation for Rhodesian specialists to join."
RHS_support_madagascar_invasion:0 "Madagascar Invasion Training"
RHS_support_madagascar_invasion_desc:0 "The Colonial Administration have declared their allegiance to the Vichy French Government. This creates a significant risk for Allied Shipping in the region and the British Admiralty is preparing force to invade and secure the island. We should begin a training programme to enable our forces to conduct opposed landings for either Madagascar or any other occupied land."
RHS_rhodesian_special_air_service:0 "Rhodesian Special Air Service"
RHS_rhodesian_special_air_service_desc:0 "The British Army’s Major David Stirling has created an new organisation that is quite novel in that they operate in small groups behind enemy lines. This sort of organisation, known by the British Army as the SAS, seems ideally suited for the Rhodesian armed forces. We should set up a local regiment of the SAS to help us make an impact on the war effort."
RHS_specialize_equipment:0 "Specialised Equipment"
RHS_specialize_equipment_desc:0 "Our limited military budget means that we must prioritise the equipment that we procure to the environments that they are most likely to be deployed to. Once we have decided how our armed forces will be composed we should begin getting our boys the right tools to do the job."
RHS_rhodesian_armoured_regiment:0 "Rhodesian Reconnaissance Regiment"
RHS_rhodesian_armoured_regiment_desc:0 "In order to provide some organic armoured support to our predominantly infantry based army, the Rhodesian Chief of Staff has outlined proposals for the creation of an armoured car regiment. These armoured cars will be tasked primarily with reconnaissance duties."
RHS_rhodesian_armoured_corps:0 "Rhodesian Armoured Corps"
RHS_rhodesian_armoured_corps_desc:0 "The South African High Command has informed us of their intention to form an armoured division in an effort to reduce manpower requirements and reduce casualties. These aims align perfectly with Southern Rhodesia's current situation and therefore we should consider forming a specialist armoured formation for the same purpose."
RHS_lessons_east_africa_campaign:0 "Lessons of the East Africa Campaign"
RHS_lessons_east_africa_campaign_desc:0 "During the Great War the British Colonies of Central, South and East Africa were locked in a struggle against German Forces under Lettow-Vorbeck. Despite the fact he mainly ran away, we did learn considerable lessons on how to conduct a campaign, which should be taken on board once again for the next war."
RHS_nr_army_service_corps:0 "Northern Rhodesia Army Service Corps"
RHS_nr_army_service_corps_desc:0 "One of the major lessons from the East Africa Campaign was the importance of a well organised logistics system. To support the force of British Central Africa we will assist authorities in Northern Rhodesia with the establishment of a dedicated logistics formation."
RHS_nr_field_ambulance:0 "Nothern Rhodesia Field Ambulance"
RHS_nr_field_ambulance_desc:0 "During the Great War more men were lost due to disease than enemy action in the east africa theatre. Significant effort is therefore being dedicated towards strong medical support for all formation sizes to ensure that no man dies unnecessarily."

