RHS_godfrey_huggins:0 "Godfrey Huggins"
RHS_godfrey_huggins_desc:0 "Godfrey Martin Huggins, later 1st Viscount Malvern, served as the fourth Prime Minister of Southern Rhodesia from 1933 to 1953 and remained in office as the first Prime Minister of the Federation of Rhodesia and Nyasaland until 1956. He became the longest serving Prime Minister in British Commonwealth history."
