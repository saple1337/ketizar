RHS_charles_meredith:0 "Charles Meredith"
RHS_charles_meredith_desc:0 "Meredith was appointed Director of Civil Aviation in Southern Rhodesia in 1939 and commissioned as an Air Commodore in the Royal Air Force Volunteer Reserve on 21 March 1940, where he served for the duration of the hostilities. He became Air Officer Commanding of the Rhodesian Air Training Group, part of the Empire Air Training Scheme with Sir Archibald Sinclair, the British Secretary of State for Air, later praising the excellent quality of the reinforcements coming to the RAF from the Rhodesian Air Training Group schools."

