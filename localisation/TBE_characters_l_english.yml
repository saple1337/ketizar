SUD_anthony_arkell:0 "Anthony Arkell"
SUD_anthony_arkell_desc:0 "Arkell joined the Royal Flying Corps in 1916 and served with the 39th Squadron, now the RAF in World War I. On 20 March 1918, while on a night patrol with his gunner-observer First Air Mechanic Albert Stagg, the pair shot down a Gotha G.V bomber in their Bristol F.2 Fighter 'Devil-in-the-Dark'. Arkell received the Military Cross and Stagg received the Military Medal for their actions.\n\nHe joined the Sudan Political Service in 1920 and was appointed Assistant District Commissioner for Darfur in Sudan in 1921. In 1925 he moved to Dar Masalit, and was appointed District Commissioner at Kosti from 1926-9 and later at Sennar.\nDuring his time in Kosti, Arkell was instrumental in ending the §Rslave trade§! between the §GSudan§! and §YEthiopia§!, arresting dealers and establishing villages for the freed slaves, who named themselves 'Beni Arkell', the "Sons of Arkell". It was for this humanitarian service that he was awarded the MBE in 1928, and the Order of the Nile (4th class) in 1931. He was acting governor of the province of Darfur from 1932 to 1937.\n\nWhile District Commissioner and Governor, he published articles in the Sudan Notes and Records on many topics, including archaeology, anthropology, geography, and science. While on leave he learnt excavation techniques on British sites under Sir Mortimer Wheeler. In 1938 he was appointed the first Commissioner for Archaeology and Anthropology for the Sudan.[4] He was instrumental in the creation in the National Museum of Antiquities in Khartoum. He encouraged Sudanese students and others to take an interest in their own history and archaeology, appointing them to the Antiquities Service as regional inspectors. Systematic mapping and recording of sites and finds was also implemented\nThis work was interrupted by the Second World War during which he served as Chief Transport Officer in the Sudan from 1940–4."
SUD_ina_beasley:0 "Ina Beasley"
SUD_ina_beasley_desc:0 "When Beasley took up her post in October 1939 she found that Sudanese men were not opposed to female education, but that they wanted it to produce 'good wives' not 'wage earners or autonomous thinkers'.\nBeasley always stressed the importance of education for its own sake. It was an interesting time to arrive in Sudan, where the country's political identity was being formed and the relationship with the British colonial authority was tightly bound to it. When Beasley arrived both education and health were undeveloped, particularly for women.\n\nDuring her time in Sudan (1939-49), Beasley focused on working within Sudanese cultural boundaries to produce educational change. She stated that - "The most encouraging feature is in recognising the possibilities which are in the girls themselves, and feeling that it is they who may eventually overcome the many obstacles to development which have been placed in their way. The disheartening results in some districts are balanced by the embarrassing success in others. Perhaps if the work goes on quietly in the same unostentatious spirit at the end of the next twenty years there may be a proportionately greater tale to tell."\nDuring her career, Beasley's work in female education had a profound impact on the educational system for women in Sudan.\n\nShe was also concerned with the practice of female genital mutilation, which was widely carried out in Sudan at the time.\nBeasley believed that change to these practices could only come through the education of women themselves and their resistance to the practice.\n\nBeasley had a subtle understanding of the different cultural identities within Sudan, and realised the need to work with women to reduce the harm being done by these traditional practices.\nAlthough she was opposed to the practice herself, and supported educational campaigns against it - she also recognised that it was an important part of cultural identity that affected both men and women.\n\nShe supported female bodily autonomy - a side-effect of which could be a refusal to circumcise, and she organised an educational campaign which focused on schools and organised for Sudanese teachers to tour remote schools to discuss the practice and its effects on health."
SUD_john_bowers:0 "John Bowers"
SUD_john_bowers_desc:0 "Following the completion of his postgraduate courses in Arabic, Islamic Culture, Anthropology and Law, he joined the Sudan Political Service in 1935.\n\nDuring the Second World War he was seconded to the Sudanese Defence Force, based at Kufra oasis. Later he fought in Ethiopia with the Upper Nile Scouts and in the Libyan desert, where he was badly wounded.\n\nFollowing the war he joined UNESCO, at the request of Sir Julian Huxley, where he worked in adult education, agriculture and literacy in Africa, India, South-East Asia and Central America. Bowers was a vigorous supporter of the Third World through the United Nations and he became head of fundamental education at UNESCO for 20 years from 1947. He was the architect of UNESCO's activities worldwide in literacy and adult education.\nHe inducted qualified educationists from the so-called Third World countries to the UNICEF, who later on contributed immensely to their respective countries in the field of education."
SUD_thomas_percival_creed:0 "Thomas Percival Creed"
SUD_gerard_crole:0 "Gerard Crole"
SUD_douglas_dodds_parker:0 "Douglas Dodds-Parker"
SUD_douglas_dodds_parker_desc:0 "He joined the elite Sudan Political Service (SPS) in 1930. The size of territory allotted to each young graduate, just starting their career, was immense and the SPS needed to, and was able to, choose only the pick of each year's crop. He spent three years in Kordofan, the two years in the secretariat in Khartoum, as private secretary to the Governor-General, Sir Stewart Symes.\n\nIn 1935, the Italian invasion of Ethiopia prompted some soul-searching about the defence of the British territories in the vicinity. The Sudan was the missing 'bridge' between Italian East Africa and Italian North Africa, so the issue was taken very seriously in Khartoum. Accordingly, some young SPS were allowed to join the reserve of the Sudan Defence Force (SDF). This was to prove useful when the war did break out later, as most administrators had to remain in post for some time, until older men could be recalled to replace them.\n\nAfter the war broke out in 1939, Dodds-Parker left Sudan to join the Grenadier Guards, but was seconded to the Special Operations Executive when it was formed in July 1940. He served in the field as an officer in Gideon Force, under Orde Wingate, organising "ungentlemanly warfare" against Italy in Ethiopia and helping Emperor Haile Selassie to return to Addis Ababa in May 1941. As well as Wingate, he served with (Sir) Wilfred Thesiger and (Sir) Laurens van der Post."
SUD_willian_ran_laurie:0 "Willian 'Ran' Laurie"
SUD_willian_ran_laurie_desc:0 "Laurie was born in Grantchester, Cambridgeshire, in 1915 and began his prosperous rowing career at Cambridge University. At the 1936 Olympics, he rowed as stroke in Great Britain's eight, the team eventually finishing in fourth place. Laurie joined the Sudan Political Service in 1936, becoming District Commissioner of Nyala province and taking an active interest in developing basic healthcare services in the region.\n\nAfter war, Laurie renewed his rowing career and won a gold medal in the coxless pair event at the 1948 Olympics in London, alongside his rowing mate Jack Wilson.\n\nHe is also the father of British comedy and television actor Hugh Laurie."

