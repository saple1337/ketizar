HNK_andrew_chan_chak:0 "Andrew Chan Chak"
HNK_andrew_chan_chak_desc:0 "In 1939 Chan, then a Rear Admiral, was sent to Hong Kong as Liaison Officer of the Nationalist Government. Under the cover as a stockbroker, he arranged for the transportation of materiel into China despite the Japanese blockade, and at the same time liaised with British colonial authorities, keeping the local Chinese population on-side, controlling the Triad gangs and identifying Japanese sympathisers. On 8 December 1941 the Battle of Hong Kong began; on Christmas Day the Governor, Sir Mark Aitchison Young, informed Chan of his intention to surrender to the Japanese. Chan decided to flee Hong Kong, and was given command of the five remaining Royal Navy Motor Torpedo Boats. In Aberdeen Harbour he and his entourage boarded the motor launch Cornflower II; while on the way to a rendezvous with the torpedo boats waiting south of Ap Lei Chau it was fired upon by Japanese forces. Chan ordered “Abandon Ship”, threw off his artificial leg, only to be shot at the left wrist; barely able to swim with one arm and one leg (he gave his life jacket to his bodyguard, who did not know how to swim), he was dragged ashore by his aide-de-camp, Lieutenant-Commander Henry Hsu. The torpedo boats came to their rescue, then headed towards Mirs Bay at high speed. From there the escapees, with the help of Chinese guerrillas, walked for four days through Japanese-occupied territories towards Huizhou in unoccupied China. Altogether sixty eight British, Chinese and Danish intelligence, naval and marine personnel were saved in the breakout, including David Mercer MacDougall, who had worked with Chan on intelligence matters. For this feat Chan was made an honorary Knight Commander of the Order of the British Empire in 1942."
