#Paradox Crash Report Text ### Dear Paradox,I need your help. I absolutely love this game and have been steadily building "The British Empire" mod for years as a passio project. While i really like the new content for the latest DLC, the latest relaease has sadly caused a bug in my mod. Please can you help me solve it. The game crashes after selecting which country to play as and loading the map. The error log and bug report does not show what causes the crash to occur. I have gone through and fixed almost every error in the error log but it still crashes when loading the bookmark. If you can find an answer to why this happens then please could you let me know by posting a comment in my steam mod page https://steamcommunity.com/sharedfiles/filedetails/?id=1723012229    I know you do not offer mod support normally and this crash report is just for base game support, but I do not know where else to turn to solve this issue. Best regards, Welshy

