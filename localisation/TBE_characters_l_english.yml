ENG_frank_whittle_desc:0 "Air Commodore Sir Frank Whittle, OM, KBE, CB, FRS, FRAeS[1] (1 June 1907 – 8 August 1996) was a British engineer, inventor and Royal Air Force (RAF) air officer. He is credited with inventing the turbojet engine. A patent was submitted by Maxime Guillaume in 1921 for a similar invention which was technically unfeasible at the time. Whittle's jet engines were developed some years earlier than those of Germany's Hans von Ohain, who designed the first-to-fly (but never operational) turbojet engine.\n\nWhittle demonstrated an aptitude for engineering and an interest in flying from an early age. At first he was turned down by the RAF but, determined to join the force, he overcame his physical limitations and was accepted and sent to No. 2 School of Technical Training to join No 1 Squadron of Cranwell Aircraft Apprentices. He was taught the theory of aircraft engines and gained practical experience in the engineering workshops. His academic and practical abilities as an Aircraft Apprentice earned him a place on the officer training course at Cranwell. He excelled in his studies and became an accomplished pilot. While writing his thesis he formulated the fundamental concepts that led to the creation of the turbojet engine, taking out a patent on his design in 1930.\n\nWithout Air Ministry support, he and two retired RAF servicemen formed Power Jets Ltd to build his engine with assistance from the firm of British Thomson-Houston. Despite limited funding, a prototype was created, which first ran in 1937. Official interest followed this success, with contracts being placed to develop further engines, but the continuing stress seriously affected Whittle's health, eventually resulting in a nervous breakdown in 1940. In 1944 when Power Jets was nationalised he again suffered a nervous breakdown, and resigned from the board in 1946.\n\nIn 1948, Whittle retired from the RAF and received a knighthood. In 2002, Whittle was ranked number 42 in the BBC poll of the 100 Greatest Britons."
