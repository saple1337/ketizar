BWA_herbert_meyoritz_desc:0 "In 1936 Meyerowitz and his wife Eva made a survey of the indigenous crafts of the Gold Coast, which they found to be in decline. At Achimota, he replaced Western-style art classes based on academic drawing with an arts and crafts approach based on local skills and traditions.\n\nFrom 1937, Meyerowitz began to develop a scheme for an Institute of West African Arts, Industries and Social Sciences, which would be a "marriage of the aesthetic skill and power to modern technique". It would investigate local arts and crafts, teach certain native crafts in the light of European experience and create local craft industries. It would also investigate local history, tribal life, customs, religion and economic conditions. This scheme was approved by the West African Governors' Conference at Lagos in 1939 and the Advisory Committee on Education in 1940. Before the war, African colonies had depended on the export of commodities, which was made almost impossible by enemy shipping. The Colonial Office adopted instead a policy developing indigenous industries and eventually accepted Meyerowitz's idea.\n\nIn 1943, the Institute was set up under the direction of the Rev. Robert Stopford. Meyerowitz's colleague Michael Cardew records that only the power of Meyerowitz's "magnetic eloquence (backed up by the pressure of the war) could have persuaded the Colonial Office to support the project and the Treasury to release the necessary funds.""

