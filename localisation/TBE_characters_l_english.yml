FIJ_william_sydney_marchant:0 "William Sydney Marchant"
FIJ_william_sydney_marchant_desc:0 "As commissioner, he directed the evacuation of European settlers from the Solomon Islands prior to the Japanese occupation of the islands during World War II as well as leading the organisation of coastwatcher units throughout the islands.\n\nMarchant relocated from this headquarters at Tulagi to Malaita about two months before the Japanese occupied Tulagi in May, 1942.\nOn Malaita he helped operate a coastwatcher radio relay station in support of the Allied Solomon Islands campaign until the end of his appointment in 1943.\n\nMarchant was then appointed as Chief Native Commissioner for the Kenya Colony from 1943 until 1947. Marchant died in 1953."
FIJ_francis_noel_ashley:0 "Francis Noel Ashley"
FIJ_frederick_royden_chalmers:0 "Frederick Royden Chalmers"
FIJ_frederick_royden_chalmers_desc:0 "In 1938, Chalmers was selected from among 70 candidates to succeed R.C. Garsia as head of the administration of Nauru, a Pacific island supervised by Australia under League of Nations mandate. It had over 3,500 inhabitants, and was of strategic importance to the Commonwealth owing to its very large deposits of phosphate (which was used in fertilizer, making it critical to Australia and New Zealand's agriculture-based economies).\nHis affable manner made him a popular figure on Nauru. He introduced Berkshire pigs to the island to improve the local livestock, and also gambusia fish to combat the proliferation of mosquitoes.\n\nOn 27 December 1940, after the outbreak of the Second World War, an auxiliary cruiser of the Kriegsmarine, the Komet, appeared off Nauru's shore.\nAfter warning the residents via signals, the German commerce raider began shelling the island's mining facilities, fuel storage tanks, and cantilevered loading jetties, causing tremendous damage. An infuriated Chalmers reportedly stomped along the waterfront hurling insults at the enemy ship.\n\nA year later, the decision was made to evacuate the island with the outbreak of the Pacific War.\nAll Westerners including civilians and military garrison were taken off in February 1942 along with half the foreign workers, however, 191 Chinese were left behind along with the native Nauruans. Chalmers (along with four other Australians, two of whom were missionaries) chose to remain feeling it was their duty to look after the islanders; despite being told they would be evacuated later, they were not due to the rapid pace of the Japanese advance during the South-East Asian campaigns of 1941–42.\n\nWhen Japanese occupation forces invaded the islands in August 1942, Chalmers and the other Australians were interned in a house near the island's native hospital.\n\nOn 25 March 1943, after an American bombing raid on Nauru's Japanese-built airfield, the garrison's second-in-command, Lieutenant Hiromi Nakayama, ordered the execution of all five Australians. Chalmers and his companions were beheaded, bayoneted, or shot (later testimony varied) and buried on the beach. After the war Nakayama was found guilty of murder by an Australian war crimes tribunal at Rabaul. He was hanged in August 1946."

FIJ_martin_clemens:0 "Major Martin Clemens"
FIJ_martin_clemens_desc:0 "While responsible for nearly fifteen thousand citizens and various other people on Guadalcanal in the Solomon Islands, District Officer Clemens additionally served as a coastwatcher. The Japanese planned to cut off the United States' communications with New Zealand and Australia by building an airstrip on Guadalcanal. When they began landing infantry, support troops and engineers to begin the airstrip, Clemens reported such to the Allies by radio.\n\nThough he was a commissioned officer, Clemens received no support from the military and had no uniform. After the Japanese occupied the island of Tulagi in early May, they initiated searches for Clemens, and the other Guadalcanal coastwatchers Donald S. Macfarlan, Kenneth D. Hay, Hugh A. Mackenzie, Leif Schroeder, and F. Ashton Rhoades.\n\nIn June, the Japanese started constructing an airfield on Guadalcanal, further isolating Clemens and forcing him to conduct his activities from enclaves in the mountains. Clemens, on his jungle-shielded mountain, played a dangerous game of hide and seek with the Japanese.\nHe and his tiny coastwatcher contingent were running low on everything they needed; food, supplies, and most critically, radio batteries. Barefoot, Clemens shared the privations of his coastwatchers. His shoes had completely disintegrated.\n\nGuadalcanal became the site of the first major land offensive against the Japanese in the Cooperation between Clemens and the U.S. Marines made him a key operative on the island. Major General Alexander Vandegrift gave Clemens "complete charge of all matters of native administration and of intelligence outside the perimeter".\n\nFollowing the war, Clemens served in Palestine in 1946–1947 and Cyprus in 1948–1949, returning to Cyprus in 1951–1957 as District C he instead moved to Australia, which was home to his wife Anne.\nThis later colonial career led to his appointment as Officer of the Order of the British Empire (OBE) in the 1956 Queen's Birthday Honours, and promotion to Commander in that order (CBE) in the 1960 New Year Honours."
