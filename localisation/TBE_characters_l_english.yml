NZL_a_c_turnbull:0 "Alfred Clarke Turnbull"
NZL_a_c_turnbull_desc:0 "Alfred Turnbull was a New Zealand colonial administrator who served as Administrator of Western Samoa and Tokelau between 1935 and 1946. He was posted to Western Samoa in 1930, initially as Government Secretary.\n\nIn 1935 he was appointed Acting Administrator, succeeding Herbert Ernest Hart. Turnbull was a popular figure in Samoa, and a petition was sent to the New Zealand government requesting his a However, his position was not made permanent until 1943.\n\nHe remained in office until 1946, when he retired and was replaced by Francis William Voelcker."
NZL_frank_langstone:0 "Frank Langstone"
NZL_bob_semple_advisor:0 "Robert "Bob" Semple"
NZL_bob_semple_advisor_desc:0 "Semple was a prolific user of "unparliamentary language" during his time as an MP was fond of insulting colleagues by calling or comparing them to Australian animals such as kookaburras, kangaroos and dingoes.\n\nDuring his term in Parliament, Semple held many important infrastructure portfolios, such as Minister of Public Works (1935–1941, 1942–1943) and Minister of Railways (1941–1949).\n\nSemple was seen by many as the public face of the first Labour government's infrastructure investment. He reshaped the Public Works Department by resuming its original function as the development arm of the government by phasing out its focus on relief work from the Great Depression.\n\nDuring the Second World War he spearheaded the development and design of the 'Bob Semple tank', made from corrugated iron and a tractor base. The tank had numerous design flaws and other practical problems and was never put into production, although it was and continues to be regarded with affection by many New Zealanders.\n\nIn later life he became an ardent anti-communist."
NZL_eruera_tirikatene:0 "Eruera Tirikatene"
NZL_eruera_tirikatene_desc:0 "As the Ratana movement developed into a political movement, Eruera Tirikatene became a leader in the internal political council. In June 1932, the sitting MP for Southern Maori, Tuiti Makitanara died suddenly and Eruera won the by-election to become the first Ratana MP. Tirikatene continued to represent his electorate until his death in January 1967.\n\nFrom his maiden speech, Tirikatene made recognition of the Treaty of Waitangi one of his major aims, presenting a petition with over 30,000 signatures. The petition from the Ratana morehu was held over for thirteen years before being virtually ignored, but Tirikatane continued to raise the Treaty issue in debates.\n\nDuring the economic depression of that time, Māori were expected to subsist from their land, and were not given equal access to unemployment payments and relief work. Proving entitlement to the old age pension was also more difficult for Māori, as Māori did not have to register births until 1919. Tirikatene spoke out against this discrimination in social welfare which caused poverty to Māori and the removal of this inequality by the Labour Government strengthened the Labour and Ratana bond.\n\nFollowing the Ratana-Labour alliance, Tirikatene became the First President of the Labour Party Māori Advisory Council, a committee to set Māori policy for the party.\n\nDuring the Second World War, Tirikatene set up and led the Māori War Effort Organisation. The experience of Māori running their own affairs led him to introduce the Māori Social and Economic Advancement Act of 1945, but it did not give the independence for iwi he had hoped for."
NZL_paraire_karaka_paikea:0 "Paraire Karaka Paikea"
NZL_paraire_karaka_paikea_desc:0 "Paikea captured the Rātana Movement's third Māori electorate of Northern Maori from Taurekareka Henare in 1938. He was Minister without portfolio representing the Māori race from 1941 to 1943 and was also Māori Recruiting Director on the War Administration Board.\n\nKnown as "Piri Wiri Tua", after Tahupōtiki Wiremu Rātana, his early death on 6 April 1943 ended a promising career."
NZL_Adam_Hamilton:0 "Adam Hamilton"
NZL_Adam_Hamilton_desc:0 "In 1936, after losing power to the Labour Party, Reform and United agreed to merge, creating the National Party. Despite his somewhat tarnished public image, Hamilton was selected to lead the new party, taking over from interim leader George Forbes.\n\nHamilton was essentially a compromise candidate and given the narrowness of his victory, many did not see Hamilton as the National Party's real leader. He was reportedly not hugely charismatic, and seemingly did not inspire great loyalty from his colleagues. He was also closely associated in the public mind with the Depression era.\n\nIn the 1938 election, Hamilton and the National Party were harshly critical of the Labour government, accusing it of promoting communism and of undermining the British Empire. The campaign was seen by many as alarmist and negative, and Hamilton's own performance was widely censured. On election day, National was heavily defeated.\n\nThe National Party's defeat weakened Hamilton's grasp on the leadership somewhat, but any debate as to his future was cut short by the onset of the War.\n\nIn 1940, Hamilton suggested that Labour and National should form a wartime coalition, but this was rejected by Labour leader Peter Fraser. Fraser did, however, agree to establish a six-person "War Cabinet". This cabinet would control New Zealand's military endeavours, while leaving domestic concerns to the regular cabinet. Hamilton and Coates were National's two representatives. Participation in the War Cabinet was fatally damaging to Hamilton's leadership of the National Party, however, as many National MPs argued that he could not be party leader while serving on a Labour-led council. On 25 November, a vote of 13 to 8 replaced Hamilton with Sidney Holland.\n\nHamilton remained a part of the War Cabinet, and was eventually joined by Holland (despite the original claims that a National Party leader could not be in Cabinet). In 1942, however, National withdrew from all co-operation with the Labour Party. Hamilton, along with Gordon Coates, protested against this move, and ceased attending National caucus meetings. Both Hamilton and Coates then rejoined the war administration despite condemnation from their party colleagues. He did not seek re-election in the 1946 election, choosing to retire from politics."


