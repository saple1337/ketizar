NZL_michael_joseph_savage:0 "Michael Joseph Savage"
NZL_Peter_Fraser:0 "Peter Fraser"
NZL_Peter_Fraser_desc:0 "Born and raised in the Scottish Highlands, Fraser left education early in order to support his family. Unemployment led him to emigrate to New Zealand in 1910.\n\nDespite his fierce opposition to conscription in the Great War, Fraser became a cabinet minister in 1935, serving under Michael Joseph Savage. He held several portfolios and had a particular interest in education, which he considered vital for social reform. As Minister of Health, he introduced the Social Security Act 1938, which established a universal health care service. Fraser became the Leader of the Labour Party and Prime Minister in 1940, following Savage's death in office.\n\nFraser is best known for leading the country during the Second World War when he mobilised New Zealand supplies and volunteers to support Britain while boosting the economy and maintaining home front morale. He formed a war cabinet which included several erstwhile political opponents. Labour suffered significant losses in the 1943 election, though the party retained its majority.\n\nFollowing the war, Fraser was active in the affairs of the 'new' Commonwealth and is credited with increasing New Zealand's international stature.\n\nIn a meeting regarding the future of the commonwealth in 1949 Fraser stated:\n"New Zealand had been colonized by people of British stock, who had built their new country as an extension of the homeland; and their sentiments of loyalty and affection towards the Royal Family had intensified with the passage of time. Throughout the successive stages by which they had attained full national independence, their loyalty and allegiance had grown progressively stronger. New Zealand would not tolerate any dilution of those loyalties.""

