NZL_sir_ernest_marsden:0 "Sir Ernest Marsden"
NZL_sir_ernest_marsden_desc:0 "Sir Ernest Marsden was a British-New Zealand physicist from Manchester. In 1915 he moved to Victoria University College in Wellington, New Zealand, to become Professor of Physics. Marsden served in France during World War I as a Royal Engineer in a special sound-ranging section and earned the Military Cross.\n\nHe was appointed Assistant Director of Education before accepting the position of Secretary of New Zealand's new Department of Scientific and Industrial Research (DSIR) in 1926. The new Department's focus was on assisting primary industries, and Marsden worked to organise research particularly in the area of agriculture.\nMarsden initiated a number of projects that kept New Zealand in touch with international developments in the field of radiation and nuclear sciences. In 1939 he pioneered the non-medical use of radioisotopes in New Zealand.\n\nWith the outbreak of World War II Marsden was given the title of Director of Scientific Developments, and was charged with mobilizing New Zealand's scientific manpower. During the War he worked on radar research, setting up a team to develop the radar equipment for use in the Pacific. Marsden also used his scientific connections to form a team of young New Zealand Scientists who would participate in the American Manhattan Project developing the nuclear bomb, and initiated the search for uranium, the raw material needed for nuclear projects, in New Zealand.\n\nMarsden had a post-war vision of a nuclear New Zealand, with scientists working on research using local nuclear reactors, and developing connections with the British nuclear energy and weapons program. Ties between Marsden and the scientific community in Britain remained strong, and in 1947 he became the DSIR's scientific liaison officer in London.\nAs his studies turned to the impact of fallout from radioactive bombs, Marsden came to oppose testing and the development of nuclear weapons. While Marsden had a significant role in establishing and encouraging nuclear science in New Zealand, this role of speaking out against nuclear weapons development and testing - which he only did after the British nuclear testing program was complete - is less known.\nIn 1966, the same year France began testing nuclear bombs in the Pacific, Marsden suffered a stroke which left him confined to a wheelchair. He later died at his home in Lowry Bay, Lower Hutt on the shores of Wellington Harbour in 1970."

