AST_sir_lawrence_james_whackett_desc:0 "Sir Lawrence James Wackett KBE, DFC, AFC (2 January 1896 – 18 March 1982) is widely regarded as "father of the Australian aircraft industry". He has been described as "one of the towering figures in the history of Australian aviation covering, as he did, virtually all aspects of activities - pilot, designer of airframes and engines, entrepreneur and manager of the Commonwealth Aircraft Corporation". He was knighted for his services to aviation and was a winner of the Oswald Watt Gold Medal.\n\nShortly after the establishment of the Commonwealth Aircraft Corporation (CAC), Tugan Aircraft was purchased to give CAC a nucleus of experienced personnel. Upon joining CAC Wackett immediately became the General Manager and he oversaw the entry into production of the first aircraft mass-produced in Australia, the CAC Wirraway development of the NA-16 he had earlier recommended.\n\n In many ways the story of Lawrence Wackett was inextricably linked with the history of the RAAF and CAC for over twenty years. He was hugely influential within the Australian aircraft industry as a whole and also within the RAAF, which often chose its combat aircraft types based on his recommendations.\n\nDuring the Second World War, Wackett presided over a company – that had not even existed a mere three years before the outbreak – employing thousands of people, that was now delivering hundreds of aircraft as well as engines and propellers for those aircraft."
