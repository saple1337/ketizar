BWA_george_hamilton_d_oyly_lyon_desc:0 "Admiral Sir George Hamilton D'Oyly Lyon, KCB (3 October 1883 – 19 August 1947) was a distinguished Royal Navy officer who went on to be appointed Commander-in-Chief of the Africa Station in 1938 (the Africa Station became the South Atlantic Station in 1939). He was also an accomplished sportsman who played first-class cricket and represented the England national rugby union team."
BWA_campbell_tait:0 "Campbell Tait"
BWA_campbell_tait_desc:0 "Admiral Sir William Eric Campbell Tait KCB MVO (12 August 1886 – 17 July 1946) was a senior British naval officer with a long and distinguished career. After serving as Director of Personal Services at the Admiralty, served as Commander-in-Chief, South Atlantic Station from 1942 and in this capacity, he established and headed a Combined Headquarters in Cape Town, where he led the Royal Navy, South African Army and South African Air Force, which was considered an important factor in maintaining allied domination around the Cape.\n\nIn 1945, Tait was appointed Governor of Southern Rhodesia on 20 February 1945. There is an Admiral Tait Primary School in Harare, Zimbabwe, named in honour of Tait."

