BWA_francis_edward_small_desc:0 "Edward Francis Small (29 January 1891 – January 1958) was a Gambian statesman who has been described as the "trailblazer of Gambian political consciousness." One of the few educated Africans in the Gambia Colony and Protectorate during the early 20th century, Small founded the country's first trade union (Bathurst Trade Union), the country's first political party (Rate Payers' Association), and was the first citizen elected to its legislature. He was also a delegate to and leader of the National Congress of British West Africa (NCBWA)."
