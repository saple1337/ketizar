RAJ_colin_hercules_mckenzie:0 "Colin Hercules Mckenzie"
RAJ_colin_hercules_mckenzie_desc:0 "Colin Hercules Mackenzie, CMG (1898–1986), was a soldier, industrialist, and a Special Operations Executive spymaster. During the Second World War, at the suggestion of his friend Lord Linlithgow, Mackenzie was appointed to set up a Far Eastern mission for Special Operations Executive, which became known in due course as Force 136. Unusually for senior SOE personnel, he remained in his post to the end of the war, despite the numerous political and other challenges that he faced. An official SOE report in 1944 recorded that:\n\nNo one can visit India without being impressed by Colin Mackenzie; by his exceptional grip on the working and personnel of his group; by his capacity to simplify and without delay go to the root of any problem; and by his remarkable sense of timing and diplomacy. The high regard in which he is held in SEAC, in GHQ India and in the Viceroy's Department is obvious. Not less impressive is the respect which all members of his group, scattered as it is all over India and China, have for his judgement; the faith they have in his capacity to produce the right solution for all problems; and the personal affection in which he is held.\n\nBy the end of the war, Mackenzie's command had expanded to the extent that he was responsible for 33,000 agents and auxiliaries in South East Asia."
RAJ_sir_sahib_singh_sokhey:0 "Sir Sahib Singh Sokhey"
RAJ_jehangir_ratanji_dadabhoy_tata:0 "J.R.D Tata"
RAJ_jehangir_ratanji_dadabhoy_tata_desc:0 "Jehangir Ratanji Dadabhoy Tata (29 July 1904 – 29 November 1993) was an Indian aviator, industrialist, entrepreneur and chairman of Tata Group.\n\nBorn into the Tata family of India, he was the son of noted businessman Ratanji Dadabhoy Tata and his wife Suzanne Brière. His mother was the first woman in India to drive a car and, in 1929, he became the first licensed pilot in India. He is also best known for being the founder of several industries under the Tata Group, including Tata Consultancy Services, Tata Motors, Titan Industries, Tata Salt, Voltas and Air India. In 1983, he was awarded the French Legion of Honour and in 1955 and 1992, he received two of India's highest civilian awards the Padma Vibhushan and the Bharat Ratna. These honours were bestowed on him for his contributions to Indian industry."
RAJ_sir_malik_feroz_khan_noon:0 "Sir Malik Feroz Khan Noon"
RAJ_sir_reginald_maitland_maxwell:0 "Sir Reginald Maitland Maxwell"
RAJ_sir_abraham_jeremy_raisman:0 "Sir Abraham Jeremy Raisman"
RAJ_sir_girija_shankar_bajpai:0 "Sir Girija Shankar Bajpal"
RAJ_sir_sikander_hyat_khan:0 "Sir Sikander Hyat Khan"
RAJ_sir_sikander_hyat_khan_desc:0 "Khan Bahadur Captain Sir Sikandar Hayat Khan was an Indian politician and statesman from the Punjab who served as the Premier of the Punjab and held other positions.\nDuring the First World War, he worked as a War Recruitment Officer in his native Attock district and later served as one of the first Indian officers to receive the King's Commission, with the 2/67th Punjabis (later the 1/2nd Punjab Regiment).\n\nAfter an outstanding period of political enterprise from 1924 he was appointed a Knight Commander of the Order of the British Empire, and he in due course took over leadership of the Unionist Party from Sir Fazli Husein. Khan led the Unionists to victory in the 1937 elections and was soon after confronted by internal pressure from many of his Muslim parliamentary colleagues.\n\nHe acted to maintain a balanced, equitable stance in the volatile and much-divided Punjabi political arena, and decided to negotiate with the Muslim elements under the leadership of Muhammad Ali Jinnah. Khan and Jinnah signed the Jinnah-Sikandar Pact at Lucknow in October 1937, merging the Muslim elements of his powerful Unionist force with the All India Muslim League, as a move towards reconciling the various Muslim elements in the Punjab and elsewhere in India, towards a common, united front for safeguarding their community rights and interests.\n\nHe was also later one of the chief supporters and architects of the Lahore Resolution, March 1940, calling for an autonomous or semi-independent Muslim majority region within the larger Indian confederation. Sikandar Hayat Khan, however, opposed the partition of India and condemned "any reference to the 'Lahore Resolution' as the 'Pakistan Resolution'." To Khan, the partition meant dividing the Punjab and the Unionist Party, and he was not prepared to accept this. His government carried out many reforms for the better of the Punjabi Zamindar (agrarian) community. When Indian farmers faced a crash of agricultural prices and economic distress in the late 1930s, and introduced measures to alleviate their misery in the Punjab.\n\nKhan actively supported the Imperial war effort and believed in politically co-operating with the British for the independence of India and the unity of Punjab."
RAJ_sir_seth_hukumchand:0 "Sir Seth Hukumchand"
RAJ_sir_arcot_ramasamy_mudaliar:0 "Sir Arcot Ramasamy Mudaliar"
RAJ_sir_arcot_ramasamy_mudaliar_desc:0 "Ramasamy Mudaliar was an Indian lawyer, diplomat and statesman who served as a senior leader of the Justice Party and in various administrative and bureaucratic posts in British India. He was knighted in the 1937 Coronation Honours List, by which time he was a member of the Council of the Secretary of State for India.\n\nShortly before the Second World War broke out in 1939, Mudaliar was appointed member of the Viceroy's Executive Council. He was later appointed to the British Imperial War Cabinet, one of the two Indians nominated to the post, with equal rights and privileges as representatives from Britain's dominions."
