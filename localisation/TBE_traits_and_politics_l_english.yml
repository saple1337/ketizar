### New Zealand ###
POLITICS_MICHAEL_JOSEPH_SAVAGE_DESC:0 "Savage led the Labour Party to its first ever electoral victory in the 1935 election. He won public support for his government's economic recovery policies and social welfare programme. His popularity assured the Labour Party of an even more significant electoral victory in the 1938 election. His government joined Britain in declaring war against Germany in 1939. Savage saw himself as spokesman on behalf of his entire party and worked to keep its multiple factions in harness.\n\nCommonly known as the architect of the New Zealand welfare state, Savage is generally regarded by academics and the general public as one of New Zealand's greatest and most revered prime ministers.\n\nNew Zealand officially declared war on Nazi Germany on 3 September 1939 as a sign of allegiance to Britain, and in recognition of Britain's abandonment of appeasement policies, which New Zealand had always opposed. This led to Prime Minister Savage declaring (from his sick bed) two days later:\n"With gratitude for the past and confidence in the future we range ourselves without fear beside Britain. Where she goes, we go; where she stands, we stand. We are only a small and young nation, but we march with a union of hearts and souls to a common destiny.""
POLITICS_PETER_FRASER_DESC:0 "Born and raised in the Scottish Highlands, Fraser left education early in order to support his family. Unemployment led him to emigrate to New Zealand in 1910.\n\nDespite his fierce opposition to conscription in the Great War, Fraser became a cabinet minister in 1935, serving under Michael Joseph Savage. He held several portfolios and had a particular interest in education, which he considered vital for social reform. As Minister of Health, he introduced the Social Security Act 1938, which established a universal health care service. Fraser became the Leader of the Labour Party and Prime Minister in 1940, following Savage's death in office.\n\nFraser is best known for leading the country during the Second World War when he mobilised New Zealand supplies and volunteers to support Britain while boosting the economy and maintaining home front morale. He formed a war cabinet which included several erstwhile political opponents. Labour suffered significant losses in the 1943 election, though the party retained its majority.\n\nFollowing the war, Fraser was active in the affairs of the 'new' Commonwealth and is credited with increasing New Zealand's international stature.\n\nIn a meeting regarding the future of the commonwealth in 1949 Fraser stated:\n"New Zealand had been colonized by people of British stock, who had built their new country as an extension of the homeland; and their sentiments of loyalty and affection towards the Royal Family had intensified with the passage of time. Throughout the successive stages by which they had attained full national independence, their loyalty and allegiance had grown progressively stronger. New Zealand would not tolerate any dilution of those loyalties.""
