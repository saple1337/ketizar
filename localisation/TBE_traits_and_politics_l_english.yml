#### Colonial Service ####
colonial_governor:0 "Colonial Governor"
colonial_governor_desc:0 "This career civil servant has been appointed as the coordinator for all British territories in the region.\n\nWhile his power may appear to be absolute, he is heavily constrained by the will of the British Government, local legislation, local power hierarchies and the limits of the colonial budget."
colonial_governor_leader_traditional:0 "Old School Colonial Governor"
colonial_governor_leader_traditional_desc:0 "One of the old breed of His Majesty's colonial service, this governor is focused on providing stability and good governance to the people of his territory. Not wanting to be distracted by the emerging notions of self-rule, he instead focuses his efforts on maintaining the rule of law and the good will of the traditional elites in the territory.\n\nWhile his power may appear to be absolute, he is heavily constrained by the will of the British Government, local legislation, local power hierarchies and the limits of the colonial budget."
colonial_governor_leader_old_breed:0 "Old School Colonial Governor"
colonial_governor_leader_new_breed:0 "Self-rule Advocating Colonial Governor"
colonial_governor_leader_new_breed_desc:0 "One of the new emerging breed of colonial governors, this HM Colonial Service appointee is drawn to the new ideas of local self-rule and native inclusion in government. While still in the minority, these new ideas are gaining significant praise from higher educated elites and is encouraging more people to engage with the work of the colonial government.\n\nWhile his power may appear to be absolute, he is heavily constrained by the will of the British Government, local legislation, local power hierarchies and the limits of the colonial budget."
colonial_governor_leader_development_focused:0 "Development Focused Colonial Governor"
colonial_governor_leader_development_focused_desc:0 "This Colonial Governor is focused on providing greater infrastructure and services to the people of his territory and believes that this is the most important role for the colonial government outside of maintaining the rule of law.\n\nWhile his power may appear to be absolute, he is heavily constrained by the will of the British Government, local legislation, local power hierarchies and the limits of the colonial budget."

colonial_governor_idea_traditional:0 "Old School Colonial Governor"
colonial_governor_idea_traditional_desc:0 "One of the old breed of His Majesty's colonial service, this governor is focused on providing stability and good governance to the people of his territory. Not wanting to be distracted by the emerging notions of self-rule he instead focuses his efforts on maintaining the rule of law and the good will of the traditional elites in the territory."
colonial_governor_idea_new_breed:0 "Self-rule Advocating Colonial Governor"
colonial_governor_idea_new_breed_desc:0 "One of the new emerging breed of colonial governors, this HM Colonial Service appointee is drawn to the new ideas of local self-rule and native inclusion in government. While still in the minority, these new ideas are gaining significant praise from higher educated elites and is encouraging more people to engage with the work of the colonial government."
colonial_governor_idea_development_focused:0 "Development Focused Colonial Governor"
colonial_governor_idea_development_focused_desc:0 "This Colonial Governor is focused on providing greater infrastructure and services to the people of his territory and believes that this is the first and most important role for the colonial government outside of maintaining the rule of law."

HM_colonial_administrative_service:0 "HM's Colonial Administrative Service"
HM_colonial_administrative_service_desc:0 "The Colonial Administrative Service represented the authority of the colonial government in all respects.\n\nIt was an elite of generalists, people mostly with University or other higher education qualifications, and appointments were made after selection interviews intended to assess candidates’ personality, character and motivation. From the mid-1920s, they attended a year’s training course at London, Oxford or Cambridge Universities.\n\nAdministrative Officers were responsible for effecting government policy in the districts and provinces of each territory, as well as serving in the central Secretariat in the capital. First appointment was normally in the Provincial Administration. The starting rank was District Officer (cadet), during the first two years of probation; then District Officer (in some territories termed Assistant District Commissioner); rising to District Commissioner when given such charge, and Provincial Commissioner above that. Colonial Governors were normally selected from appropriately senior officers.\n\nExceptions were Gibraltar, Malta and Bermuda, formerly classified as "fortress" colonies, where until the post-war years the governors were normally military or naval officers, and thereafter were usually political appointees. The first responsibility of the Colonial Administrative Service on was the maintenance of law and order. However, contrary to popular belief, this was largely implemented through the agency of indigenous police forces, local courts, district councils and local chiefs although there were variations between the different territories.\n\nIn practice, Administrative Officers spent much of their time, especially after World War Two, in supervising and coordinating development of all kinds in their districts including medical services, schools, infrastructure, water supply, and provision of agricultural and veterinary services."
