BWA_inspector_general_african_colonial_forces_desc:0 "Giffard returned to West Africa in 1936, when he was appointed Inspector-General of the West African Frontier Force. He was appointed Inspector-General of African Colonial Forces in 1936.\n\nIn 1941 he became Commander-in-Chief of the West Africa Command. In addition to organising the logistic infrastructure, Giffard's major achievement was the reorganisation of the units of the Royal West African Frontier Force into two field infantry divisions, capable of serving as independent forces in rough terrain. Initially, this was in response to a potential threat from Vichy French forces in Senegal and Niger.\n\nLater, these two divisions, 81st (West Africa) Division and 82nd (West Africa) Division served with distinction in the Burma Campaign."

