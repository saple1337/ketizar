######################################
#### TBE NEWS EVENTS LOCALISATION ####
######################################

tbe_news.1.title:0 "The Fourth Anglo-Boer War"
tbe_news.1.desc:0 "Long simmering tensions in [SAF.GetName] have now broken out into open war. The Afrikaan Nationalists claim that the policies of the Unionist Smuts government are threatening the [SAF.GetAdjective] way of life. The Unionists, they say, stab the brave warriors of the Boer Wars in the back with their increasing support for the rights of the native population and by backing the [ENG.GetName]. \n\nThe Nationalist Provisional Government under D.F. Malan has called on all true patriots to join them in restoring freedom to South Africa through force of arms. The Unionist government in Capetown has labeled the Nationalists "insurgents and traitors of the worst kind". With the majority of the Union Defence Force declaring their support for Field Marshal Smuts and against the Boer militias, the conflict in South Africa is deep-rooted, and may take a long time to resolve."
tbe_news.1.a:0 "Perhaps we should consider sending support."
tbe_news.1.b:0 "Perhaps the biggest threats are inside our borders..."
tbe_news.1.c:0 "This was a long time coming."

tbe_news.2.title:0 "Smuts Assumes South African Premiership"
tbe_news.2.desc:0 "Prime Minister Hertzog, wishing to keep South Africa neutral in the war in order to preserve domestic unity, lost a Cabinet vote on the matter. Believing that he would win a vote in South African parliament on the matter he took the issue to the lower house. The United Party caucus revolted against Hertzog's stance of neutrality, causing Hertzog's government to lose the vote on the issue in parliament by 80 to 67.\n\nGovernor-General Sir Patrick Duncan refused Hertzog's request to dissolve parliament and call a general election on the question. Following this defeat Hertzog resigned the premiership and his coalition partner Jan Smuts has become prime minister of a coalition of war supporting parties."
tbe_news.2.a:0 "A hero of empire returns"
tbe_news.2.b:0 "So much for appeasement"
tbe_news.2.c:0 "So much for appeasement"

tbe_news.3.desc:0 "In the South African Parliament today, General Jan Smuts called on the speaker of the house, to divide the chamber to vote on a motion of no confidence just as Prime Minister Hertzog began speak to promote his amendment to the Representation of Native's Act.\nThis move, clearly timed by Smuts to have the maximum impact on the distracted Hertzog, saw the government defeated by a mere eight votes.\nThe Governor General then asked General Smuts to form a coalition government and he now holds a slim majority. The British descended population is in celebration this evening, but their Afrikaan neighbours have varying opinions, with some pleased to see a change a government, but others looking towards other radical parties to see to their interests."

tbe_news.4.title:0 "The Southern African Federation is Formed"
tbe_news.4.desc:0 "Prime Minister Smuts, made a declaration in Capetown today where he procalaimed that a new era in African hstory had dawned.\n\nThe Southern African Federation is being see by many observers across the British Empire as the final realisation in Rhodes's dream of a united federal state stretching across British Southern Africa. This achievement is overshadowed howerver by the radical change in trajectory of south africa's politics, which has reversed from segregation and instead expanded the franchise and opportunities to the african popultion.\n\nDivisions remain, but a new path has been laid for the future of Southern Africa."
tbe_news.4.a:0 "God save the King."

tbe_news.5.title:0 "The Italian Civil War"
tbe_news.5.desc:0 "Thge signing of the Armistace at Cassibile was meant to bring Italy out of the war. But it seems that the German Government had other ideas.\nGermany has moved rapidly, freeing Benito Mussolini from internment and attacking Royalist Italian forces in Italy, southern France and the Balkans.\nMost of Italy is now being occupied by German troops, who have established an Italian puppet state under Mussolini, the Italian Social Republic.\n\nItaly has therefore been plunged into civil war, with brothers and sisters fighting one another to decide the future of their country."
tbe_news.5.a:0 "There is precedent for Italy being divided."

tbe_news.6.title:0 "India is Granted Dominion Status"
tbe_news.6.desc:0 "Following heated discussions between the mainly Conservative diehards and sympathetic members from the Labour Party within the National Government, the British Cabinet has collectively decided that the British Empire can no longer maintain control over India, and so she should be granted Dominionhood.\n\nThis news has sent shockwaves through the British establishment and has emboldened nationalists across the British Empire, especially in India.\n\nThere is major uncertainty among British buisnesses and communities in India following the news, as it is unclear what circumstances India will find itself when given Dominionhood."
tbe_news.6.a:0 "That escalated quickly"
tbe_news.6.b:0 "The thin end of the wedge"
tbe_news.6.c:0 "The British Lion grows weaker"

tbe_news.8.title:0 "India Gains Independence"
tbe_news.8.desc:0 "Today marks the formal end of British rule in India, which has maintained a presence in the subcontinent for over 300 years. The British have formally handed over political authority and legal jursidiction to the new Indian Government, which is currently being led by the Indian National Congress.\n\nThe British Government reportedly wishes that the Indian Government will remain aligned with the British Commonwealth in trade and security terms, but with the final British forces now departing India, the country may take a very different path."
tbe_news.8.a:0 "Gone is the British Raj, and in its wake, emerges modern India."

tbe_news.9.title:0 "[HYD.GetNameDefCap] Accedes into [PAK.GetNameDef]"
tbe_news.9.desc:0 "[HYD.GetNameDefCap] has agreed to accede into [PAK.GetNameDef]. Their only demands are that the Nizam remains as the head of state and that local laws and currencies remain in place for a brief transition period."
tbe_news.9.a:0 "It seems Pakistan is gaining strength"

TBE_sudan_equitoria_mutiny.title:0 "The Equitoria Corps Mutiny"
TBE_sudan_equitoria_mutiny.desc:0 "Following months of growing hostilities, troops from the Equitoria Corps of the Sudan Defence Force have mutinied against their [SUD.GetAdjective] commanders. This mutiny has effectively triggered a wider uprising from the tribes within Equitoria against [SUD.GetNameDef]."
TBE_sudan_equitoria_mutiny.a:0 "Where on earth is Equitoria?"

