news.1008.t:0 "Gandhi Arrested"
news.1008.d:0 " In a sweeping crackdown on the Indian independence movement, British Raj authorities today arrested Mohandas Karamchand Gandhi, popularly known as Mahatma Gandhi, along with several key leaders of the Indian National Congress. The arrests took place in the early hours of the morning as part of a government effort to suppress growing calls for self-rule. The detentions follow Gandhi’s recent call for nonviolent civil disobedience against British rule, which has galvanized millions across the country. Authorities accused the Congress leaders of inciting unrest and undermining the British government’s wartime efforts."
news.1008.a:0 "Another failed attempt at freedom"

